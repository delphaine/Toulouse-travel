  --pastel-bleu:  #7B9EBB;
  --gold:         #D4A853;
  --gold-light:   #E8C4A8;
  --transport:    #6B8E9F;

  --cream:        #FDF5F0;
  --cream-dark:   #EDE3D3;
  --peche:        #FAE8DC;
  --rose-dragee:  #F5D5E2;
  --lilas:        #EAD8F0;
  --ciel:         #D8EAF5;
  --sable:        #F5EAD8;

  --dark:         #3D1F1A;
  --medieval:     #4A3728;
  --bordeaux:     #6B3A40;
  --stone:        #8B7355;
  --text:         #3D2B1F;
  --text-muted:   #B87A6A;

  --f-display: 'Playfair Display', serif;
  --f-body:    'DM Sans', sans-serif;
  --f-italic:  'Cormorant Garamond', serif;

  --r:     8px;
  --r-sm:  4px;
  --r-lg:  14px;

  --shadow:      0 2px 12px rgba(44,24,16,.07);
  --shadow-deep: 0 8px 32px rgba(44,24,16,.14);

  --nav-h:    64px;
  --safe-btm: env(safe-area-inset-bottom, 0px);
  --pb:       calc(var(--nav-h) + var(--safe-btm));
}

/* RESET */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--f-body);background:var(--cream);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:var(--pb)}

/* APP SHELL */
.app-section{display:none;min-height:100dvh}
.app-section.active{display:block;animation:fadeUp .25s ease both}

/* BOTTOM NAV */
.app-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--dark);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding-bottom:var(--safe-btm)}
.app-nav-btn{flex:1;min-height:var(--nav-h);padding:10px 4px 8px;background:none;border:none;color:rgba(255,255,255,.4);font-family:var(--f-body);font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:color .2s;position:relative}
.app-nav-btn .ni{width:22px;height:22px;line-height:1;display:flex;align-items:center;justify-content:center}
.app-nav-btn .ni svg{width:22px;height:22px;display:block}
.app-nav-btn.active{color:var(--gold-light)}
.app-nav-btn.active::before{content:'';position:absolute;top:0;width:28px;height:2px;background:var(--brick);border-radius:0 0 2px 2px}

/* HERO COMPACT */
.hero-c{background:linear-gradient(160deg,var(--rose-dragee) 0%,var(--peche) 40%,var(--brick-pastel) 70%,var(--lilas) 100%);padding:30px 20px 20px;text-align:center;position:relative;overflow:hidden}
.hero-c::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C4705A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero-c__tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);font-weight:500;margin-bottom:8px;position:relative}
.hero-c__title{font-family:var(--f-display);font-size:clamp(24px,7vw,34px);color:var(--dark);line-height:1.15;position:relative}
.hero-c__title em{color:var(--brick);font-style:italic}
.hero-c__amp{font-family:var(--f-italic);font-size:20px;color:rgba(61,31,26,.22);display:inline-block;margin:0 6px}
.hero-c__sub{font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--bordeaux);margin-top:5px;position:relative}
.hero-c__stats{display:flex;justify-content:center;gap:28px;margin-top:14px;position:relative}
.hero-stat strong{display:block;font-family:var(--f-display);font-size:22px;color:var(--brick);line-height:1}
.hero-stat span{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}

/* CHIPS */
.chips-wrap{position:sticky;top:0;z-index:200;background:var(--dark);padding:10px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(196,82,42,.2);-webkit-overflow-scrolling:touch}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;min-height:44px;padding:8px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:22px;color:rgba(255,255,255,.55);font-family:var(--f-body);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:5px}
.chip.active{background:var(--brick);border-color:var(--brick);color:#fff;font-weight:600}
.chip:hover:not(.active){background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.chip__dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6}
.chip.active .chip__dot{opacity:1;background:rgba(255,255,255,.7)}

/* DAY PANELS */
.day-panel{display:none}
.day-panel.active{display:block}

/* DAY HEADER */
.day-hdr{padding:26px 20px 16px;position:relative;overflow:hidden}
.day-bgnum{position:absolute;top:-10px;right:-10px;font-family:var(--f-italic);font-size:110px;font-weight:300;color:var(--cream-dark);line-height:1;user-select:none;pointer-events:none}
.day-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--brick);font-weight:500;margin-bottom:5px;position:relative}
.day-ttl{font-family:var(--f-display);font-size:clamp(20px,5vw,30px);color:var(--dark);line-height:1.2;margin-bottom:3px;position:relative}
.day-sub{font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--text-muted);position:relative}

/* MAP BLOCK — Leaflet remplace les anciennes iframes OSM */
.map-block{margin:0 16px 20px;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-deep)}
/* Le div Leaflet a besoin d'une hauteur explicite — les iframes l'avaient implicitement */
.map-block .leaflet-map{width:100%;height:240px;display:block}

/* Surcharge du popup Leaflet par défaut — on le fait correspondre au design system */
.leaflet-popup-content-wrapper{
  border-radius:var(--r) !important;
  box-shadow:var(--shadow-deep) !important;
  border:none;padding:0;overflow:hidden;
  font-family:var(--f-body) !important;
}
.leaflet-popup-content{margin:0 !important}
.leaflet-popup-tip-container{display:none}  /* on supprime la petite flèche */
.leaflet-popup-close-button{display:none}

/* Popup interne */
.lf-popup{padding:11px 13px;min-width:170px}
.lf-popup__badge{
  display:inline-block;color:#fff;font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:9px;margin-bottom:5px;
}
.lf-popup__type{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--text-muted);margin-bottom:2px}
.lf-popup__name{font-family:var(--f-display);font-size:14px;color:var(--dark);line-height:1.25}

/* Marqueurs circulaires — générés en JS via L.divIcon */
.lf-mkr{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);font-size:11px;font-weight:700;color:#fff;
  border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
/* Optionnel : fond pâle + bord pointillé + texte semi-transparent */
.lf-mkr--opt{
  border-style:dashed;
  border-color:rgba(0,0,0,.18);
  color:rgba(61,31,26,.65);
  box-shadow:0 1px 5px rgba(0,0,0,.12);
}

/* LÉGENDE — tuiles colorées sous la carte */
/* Chaque tuile reprend exactement la couleur du marqueur correspondant
   pour créer une cohérence visuelle parfaite entre carte et légende.  */
.map-legend{
  background:#fff;
  border-top:1px solid var(--cream-dark);
  padding:10px 14px 12px;
}
.map-legend__title{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);font-weight:600;margin-bottom:8px;
}
.map-legend__grid{
  display:flex;flex-wrap:wrap;gap:5px;
}
/* Chaque tuile de légende */
.map-legend__item{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 9px 4px 5px;
  border-radius:12px;
  background:var(--cream);
  font-size:11px;font-weight:600;color:var(--dark);
  border:1px solid var(--cream-dark);
}
/* Le petit cercle coloré dans la tuile — même couleur que le marqueur */
.map-legend__dot{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.8);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
/* Tuile optionnelle : fond pâle + bord pointillé */
.map-legend__item--opt{
  opacity:.75;
  border-style:dashed;
}
.map-legend__dot--opt{
  border-style:dashed;
  border-color:rgba(0,0,0,.15);
}
.map-sheet{background:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.map-sheet__lbl{font-size:11px;font-weight:600;color:var(--dark)}
.map-sheet__sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.map-sheet__btn{flex-shrink:0;display:inline-flex;align-items:center;background:var(--brick);color:#fff;text-decoration:none;font-family:var(--f-body);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:8px 16px;border-radius:20px;min-height:44px;white-space:nowrap;transition:background .2s}
.map-sheet__btn:hover{background:var(--brick-hover)}

/* CULTURE BOX */
.cult-box{margin:0 16px 20px;background:linear-gradient(135deg,var(--dark) 0%,var(--medieval) 100%);color:#fff;padding:20px 16px;border-radius:var(--r);position:relative;overflow:hidden}
.cult-box::before{content:'📖';position:absolute;top:-8px;right:14px;font-size:56px;opacity:.07;pointer-events:none}
.cult-box__tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px;opacity:.8}
.cult-box h3{font-family:var(--f-display);font-size:17px;margin-bottom:8px;color:#fff}
.cult-box p{font-family:var(--f-italic);font-size:14px;line-height:1.7;color:rgba(255,255,255,.75);font-style:italic}
.cult-facts{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.cult-fact{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:5px 10px;border-radius:var(--r-sm);font-size:11px;color:rgba(255,255,255,.65)}
.cult-fact strong{color:var(--gold-light);display:block;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}

/* TRAIN BANNER */
.train-ban{margin:0 16px 16px;background:var(--dark);color:#fff;padding:12px 14px;border-radius:var(--r);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.train-ban__lbl{font-weight:600;font-size:12px}
.train-ban__info{font-size:11px;color:rgba(255,255,255,.6);flex:1}
.train-ban__badge{font-size:10px;background:rgba(212,112,90,.3);padding:3px 9px;border-radius:11px;color:var(--gold-light);white-space:nowrap}

/* TIMELINE */
.timeline{padding:0 16px 24px}
.tl-item{display:grid;grid-template-columns:50px 1fr;gap:0 14px}
.tl-time{text-align:right;padding-top:20px}
.tl-time span{font-size:11px;font-weight:600;color:var(--brick)}
.tl-body{position:relative;padding:0 0 0 16px;border-left:2px solid var(--cream-dark)}
.tl-dot{position:absolute;left:-6px;top:22px;width:10px;height:10px;border-radius:50%;background:var(--brick);border:2px solid var(--cream)}
.tl-dot.gold{background:var(--gold)}
.tl-dot.stone{background:var(--stone)}
.tl-dot.transport{background:var(--transport)}
.tl-card{background:#fff;border-radius:var(--r);padding:14px 13px;margin:10px 0;box-shadow:var(--shadow);border-left:3px solid var(--cream-dark);transition:box-shadow .2s,transform .2s}
.tl-card:active{box-shadow:var(--shadow-deep);transform:scale(.99)}
.tl-card.highlight{border-left-color:var(--brick)}
.tl-card.food{border-left-color:var(--gold)}
.tl-card.culture{border-left-color:var(--stone)}
.tl-card.transport{border-left-color:var(--transport)}
.c-type{font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:3px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
/* Icône SVG dans le label de type — hérite de la couleur du parent via currentColor */
.svg-type-ico{display:inline-flex;align-items:center;flex-shrink:0}
.svg-type-ico svg{width:13px;height:13px;display:block}
.c-type.highlight{color:var(--brick)}
.c-type.food{color:var(--gold)}
.c-type.culture{color:var(--stone)}
.c-type.transport{color:var(--transport)}
.c-title{font-family:var(--f-display);font-size:16px;color:var(--dark);margin-bottom:5px;line-height:1.25}
.c-desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:8px}
.c-meta{display:flex;gap:10px;flex-wrap:wrap}
.c-meta span{font-size:10px;color:var(--text-muted)}
/* NOTE: .story-btn/.story-drw/.c-alt conserves pour retrocompatibilite
   si des steps avec story/alternatives sont re-introduits dans TRIP{} */
.story-btn{background:none;border:1px solid rgba(196,82,42,.22);color:var(--brick);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;margin-top:9px;transition:all .2s;font-family:var(--f-body);min-height:44px}
.story-btn:hover{background:var(--brick);color:#fff}
.story-drw{background:linear-gradient(to bottom,var(--cream-dark),var(--cream));border:1px solid rgba(196,82,42,.12);border-radius:var(--r);padding:13px 15px;margin-top:7px;display:none;font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--medieval);line-height:1.8;position:relative}
.story-drw::before{content:'"';font-size:46px;color:var(--brick);opacity:.1;position:absolute;top:-7px;left:9px;font-style:normal;line-height:1}
.story-drw.open{display:block}
.c-alt{margin-top:9px;padding:9px 11px;background:var(--cream);border-radius:var(--r-sm);font-size:11px;line-height:1.9;color:var(--dark)}
.c-alt a{color:var(--brick);font-weight:500;text-decoration:none}
.c-alt-hdr{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
.link-p{color:inherit;text-decoration:none;border-bottom:1px dashed rgba(196,82,42,.3);transition:border-color .2s}
.link-p:hover{border-color:var(--brick)}

/* FREE DAY */
.free-day{margin:14px 16px 28px;background:#fff;border-radius:var(--r);padding:22px 18px;box-shadow:var(--shadow);text-align:center}
.free-day__orn{font-family:var(--f-italic);font-size:34px;color:var(--gold);margin-bottom:10px}
.free-day__ttl{font-family:var(--f-display);font-size:19px;color:var(--dark);margin-bottom:10px}
.free-day__txt{font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--bordeaux);line-height:1.8;text-align:left}

/* OVERVIEW */
.ov-grid{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ov-card{background:#fff;padding:16px 13px;border-radius:var(--r);cursor:pointer;transition:all .2s;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:95px;
  /* reset button */
  border:none;text-align:left;font-family:inherit;width:100%}
.ov-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--brick);transform:scaleX(0);transition:transform .2s}
.ov-card:active::after{transform:scaleX(1)}
.ov-card:active{background:var(--peche)}
.ov-num{font-family:var(--f-italic);font-size:38px;color:var(--cream-dark);font-weight:300;line-height:1;margin-bottom:3px}
.ov-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--brick);margin-bottom:3px;font-weight:600}
.ov-ttl{font-family:var(--f-display);font-size:13px;color:var(--dark);margin-bottom:3px;line-height:1.2}
.ov-sub{font-size:10px;color:var(--text-muted);line-height:1.4}

/* BUDGET */
.budget{background:var(--dark);padding:22px 14px;margin-top:8px}
.budget__ttl{font-family:var(--f-display);font-size:18px;color:#fff;text-align:center;margin-bottom:16px}
.budget__grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin:0 auto}
.budget__item{text-align:center;padding:13px 9px;background:rgba(255,255,255,.05);border-radius:var(--r);border:1px solid rgba(255,255,255,.07)}
.budget__amt{font-family:var(--f-display);font-size:22px;color:var(--gold-light);display:block}
.budget__lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:3px;display:block}
.budget__note{text-align:center;margin-top:11px;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px}

/* RESTOS */
.restos-hdr{background:linear-gradient(160deg,var(--peche) 0%,var(--rose-dragee) 60%,var(--lilas) 100%);padding:24px 20px 18px;text-align:center}
.restos-hdr__tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);font-weight:500;margin-bottom:7px}
.restos-hdr h1{font-family:var(--f-display);font-size:clamp(22px,7vw,32px);color:var(--dark);line-height:1.2}
.restos-hdr h1 em{color:var(--brick)}
.restos-hdr__sub{font-size:11px;color:var(--text-muted);margin-top:6px}
.badges{display:flex;justify-content:center;flex-wrap:wrap;gap:7px;margin-top:11px}
.badge{background:#fff;border-radius:13px;padding:4px 11px;font-size:10px;color:var(--bordeaux);font-weight:500;box-shadow:0 2px 8px rgba(61,31,26,.08)}
.restos-intro{padding:13px 20px 5px;text-align:center}
.restos-intro p{font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--bordeaux);line-height:1.75}
.resto-cards{padding:0 14px 20px;display:flex;flex-direction:column;gap:10px}
.rc{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.rc__acc{height:4px}
/* Thumbnail photo en haut de la card */
.rc__thumb{
  width:100%;height:160px;overflow:hidden;
  position:relative;background:var(--cream-dark);
}
.rc__thumb img{
  width:100%;height:100%;object-fit:cover;
  display:block;
  transition:transform .4s ease;
}
.rc:hover .rc__thumb img{transform:scale(1.03)}
.rc__thumb--placeholder{
  display:flex;align-items:center;justify-content:center;
  height:100px;
}
.rc__body{padding:15px 13px;position:relative}
.rc__num{position:absolute;top:11px;right:12px;font-family:var(--f-italic);font-size:40px;font-style:italic;color:var(--cream-dark);font-weight:300;line-height:1;user-select:none}
.rc__cat{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.rc__name{font-family:var(--f-display);font-size:clamp(17px,5vw,22px);color:var(--dark);line-height:1.1;margin-bottom:3px}
/* .stars-row — notes et avis restos */
.stars-row{font-size:11px;color:#D4A020;letter-spacing:1px;margin-bottom:4px}
.stars-row span{color:var(--text-muted);font-size:10px;margin-left:4px}
/* .stars-row removed comment was wrong — restored */
.divider{height:1px;background:var(--cream-dark);margin:6px 0}
.rc__desc{font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--bordeaux);line-height:1.65;margin-bottom:11px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:11px}
.mi{background:var(--cream);border-radius:var(--r-sm);padding:6px 9px}
.mi__lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:2px}
.mi__val{font-size:11px;font-weight:600;color:var(--dark)}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.tag{font-size:10px;padding:3px 9px;border-radius:11px;font-weight:500}
.verdict{border-radius:var(--r-sm);padding:10px 12px;font-size:11px;line-height:1.6;color:var(--dark)}
.verdict__lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:2px;display:block}
.rc-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.btn-m{display:inline-flex;align-items:center;gap:4px;background:var(--brick);color:#fff;text-decoration:none;font-family:var(--f-body);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:8px 13px;border-radius:19px;min-height:34px;transition:background .2s;white-space:nowrap}
.btn-m:hover{background:var(--brick-hover)}
.btn-m--blue{background:var(--pastel-bleu)}

.place-card--day{cursor:pointer}

/* Card retour — pill compact, pas de hauteur fixe comme les étapes */

  padding:0 16px;
  background:var(--cream);
  border:1.5px solid var(--cream-dark);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  gap:6px;
  flex-shrink:0;

/* Tooltip Leaflet custom */
.lf-tooltip{
  background:#fff;border:none;
  border-radius:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  padding:5px 10px;
  font-family:var(--f-body);font-size:11px;font-weight:600;color:var(--dark);
  white-space:nowrap;
}

/* Forcer les marqueurs Leaflet sous l'overlay des cards.

   que les pins ne passent jamais par-dessus les cards.      */
.leaflet-marker-pane { z-index: 4 !important }
.leaflet-tooltip-pane{ z-index: 5 !important }
.leaflet-popup-pane  { z-index: 5 !important }

/* Wrapper — occupe tout l'espace disponible sous le header Cartes */
.map-swipe-wrapper{
  position:relative;
  width:100%;
  /* 108px = hauteur empirique du header .maps-hdr.
     On utilise dvh pour tenir compte de la barre d'adresse mobile.
     min-height garantit un rendu correct sur petits écrans.          */
  height:calc(100dvh - var(--pb) - 108px);
  min-height:320px;
  overflow:hidden;
  margin-top:0;
}

/* La carte Leaflet en fond absolu */
#lf-swipe-map{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* Zone overlay des cards — z-index élevé pour passer au-dessus
   des panes Leaflet (marqueurs à z-index 4, overlay à 20)     */
.cards-overlay{
  position:absolute;
  bottom:0;left:0;right:0;
  padding-bottom:16px;
  pointer-events:none;
  z-index:20;
  /* Gradient de masquage — efface proprement les marqueurs qui
     déborderaient dans la zone des cards                       */
  background:linear-gradient(to bottom,
    transparent 0%,
    transparent 40%,
    rgba(253,245,240,.85) 70%,
    rgba(253,245,240,.95) 100%
  );
}

/* Track scrollable horizontal avec scroll-snap */
.cards-track{
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px 40px 4px;
  overflow-x:auto;
  overflow-y:visible;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  pointer-events:all;
  scrollbar-width:none;
}
.cards-track::-webkit-scrollbar{display:none}

<script>
'use strict';

/* Helpers */
const $  = id => document.getElementById(id);
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

/* safeUrl — valide les URLs avant injection dans href/src
   Accepte : https, http, tel, mailto. Rejette javascript: et autres. */
function safeUrl(url) {
  if (!url) return '#';
  try {
    const u = new URL(url, location.href);
    return ['https:', 'http:', 'tel:', 'mailto:'].includes(u.protocol) ? url : '#';
  } catch { return '#'; }
}

/* ── Système de couleurs des marqueurs ────────────────────────────
   Source de vérité unique : ces couleurs sont utilisées à la fois
   pour les marqueurs Leaflet ET pour les dots de la légende colorée.
   Chaque type a une couleur "full" (stop obligatoire) et "pale"
   (stop optionnel, bord pointillé) — toutes tirées du design system. */
const MAP_COLORS = {
  hotel:      { full:'#9B7BAA', pale:null       },  /* violette                  */
  visite:     { full:'#D4705A', pale:'#F2C4A8'  },  /* brick → brick-pastel      */
  musee:      { full:'#8B7355', pale:'#C4A882'  },  /* stone → stone-light       */
  restaurant: { full:'#D4A853', pale:'#E8C4A8'  },  /* gold → gold-light         */
  cafe:       { full:'#D4A853', pale:'#E8C4A8'  },  /* gold (même que restaurant)*/
  balade:     { full:'#E8956A', pale:'#F4C8A8'  },  /* ocre → ocre-light         */
  transport:  { full:'#6B8E9F', pale:'#A8C4D0'  },  /* transport → light         */
  spectacle:  { full:'#8B7355', pale:'#C4A882'  },  /* stone                     */
  shopping:   { full:'#D4705A', pale:'#F2C4A8'  },  /* brick (≠ visite intentionnel — voir légende) */
};

/* Labels affichés dans la légende — on sépare Visite et Shopping
   même s'ils partagent la même couleur brick, car leur sémantique
   est différente (voir → acheter). La couleur commune crée du lien
   sans effacer la distinction de sens.                              */
const TYPE_LABELS = {
  hotel:      'Hôtel',
  visite:     'Visite',
  musee:      'Musée',
  restaurant: 'Restaurant',
  cafe:       'Café',
  balade:     'Balade',
  transport:  'Transport',
  spectacle:  'Spectacle',
  shopping:   'Shopping',
};

/* ── Initialisation de toutes les cartes Leaflet ──────────────────
   Cette fonction est appelée une fois après que tout le HTML a été
   injecté par les renderers. Elle lit window._pendingMaps, un tableau
   rempli par renderMapBlock() via des <script> inline, et initialise
   chaque carte Leaflet dans le bon div.

   Architecture : on utilise une queue (_pendingMaps) plutôt que
   d'initialiser dans renderMapBlock() directement, parce que Leaflet
   a besoin que le div soit dans le DOM avant d'appeler L.map().
   Les <script> inline sont exécutés au moment du innerHTML, donc
   avant que le navigateur ait rendu les divs — d'où la queue.      */
function initAllMaps() {
  if (typeof L === 'undefined') return; /* Leaflet non chargé — bail silencieux */

  /* Tuiles CartoDB Voyager — choisies pour leur accord avec la palette
     chaude brick/ocre de l'app. Pas de clé API requise.              */
  const TILE_URL  = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
  const TILE_ATTR = '© <a href="https://openstreetmap.org">OpenStreetMap</a> · © <a href="https://carto.com">CartoDB</a>';

  /* Registre global des instances Leaflet — clé: mapId, valeur: instance L.map
     Utilisé par showDay() pour appeler invalidateSize() quand un panneau
     devient visible (Leaflet calcule mal les dimensions sur display:none). */
  window._leafletMaps = window._leafletMaps || {};

  (window._pendingMaps || []).forEach(cfg => {
    const el = document.getElementById(cfg.id);
    if (!el || el._leaflet_id) return; /* div absent ou déjà initialisé */

    /* Désactiver le scroll wheel pour éviter les zooms accidentels
       quand l'utilisateur fait défiler la page sur mobile.          */
    const map = L.map(el, {
      center: cfg.center,
      zoom:   cfg.zoom,
      scrollWheelZoom: false,
      zoomControl: true,
      attributionControl: true,
    });

    /* Stocker l'instance pour pouvoir appeler invalidateSize() plus tard */
    window._leafletMaps[cfg.id] = map;

    /* Couche de tuiles CartoDB Voyager */
    L.tileLayer(TILE_URL, {
      attribution: TILE_ATTR,
      maxZoom: 19,
      subdomains: 'abcd',
    }).addTo(map);

    /* Polyligne de trajet — relie les steps dans l'ordre chronologique.
       Couleur brick à faible opacité pour guider sans concurrencer
       les marqueurs colorés qui portent l'information principale.    */
    if (cfg.steps.length > 1) {
      L.polyline(
        cfg.steps.map(s => [s.lat, s.lng]),
        { color:'#D4705A', weight:2, opacity:0.45, dashArray:'6 9', lineJoin:'round' }
      ).addTo(map);
    }

    /* Marqueurs — L.divIcon permet d'injecter du HTML arbitraire.
       IMPORTANT : bringToFront() n'existe QUE sur L.Path (SVG).
       Les L.Marker sont des éléments DOM — ne pas appeler bringToFront()
       dessus, ça lève une TypeError.                                 */
    cfg.steps.forEach(step => {
      const palette  = MAP_COLORS[step.type] || MAP_COLORS.visite;
      const bgColor  = step.opt && palette.pale ? palette.pale : palette.full;
      const isOpt    = step.opt && palette.pale;
      const isHotel  = step.type === 'hotel';

      /* Couleur du texte : blanc sur fond sombre, semi-opaque sur fond pâle */
      const textColor   = isOpt ? 'rgba(61,31,26,0.65)' : '#ffffff';
      const borderStyle = isOpt ? 'dashed' : 'solid';
      const borderColor = isOpt ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.9)';
      const shadow      = isOpt ? '0 1px 4px rgba(0,0,0,.12)' : '0 2px 8px rgba(0,0,0,.28)';
      const fontSize    = isHotel ? '10px' : '11px';

      const icon = L.divIcon({
        className: '',  /* vider la classe défaut qui ajoute un fond blanc parasite */
        html: `<div style="
          width:28px;height:28px;border-radius:50%;
          background:${bgColor};
          border:2.5px ${borderStyle} ${borderColor};
          box-shadow:${shadow};
          display:flex;align-items:center;justify-content:center;
          font-family:'Playfair Display',Georgia,serif;
          font-size:${fontSize};font-weight:700;
          color:${textColor};
        ">${step.num}</div>`,
        iconSize:    [28, 28],
        iconAnchor:  [14, 14],   /* ancre au centre du cercle */
        popupAnchor: [0, -18],   /* popup s'ouvre juste au-dessus */
      });

      /* Popup — le badge reprend la couleur pleine même pour les optionnels,
         pour assurer le contraste sur fond blanc.                          */
      const optLabel = step.opt ? ' · optionnel' : '';
      const popup = `<div class="lf-popup">
        <span class="lf-popup__badge" style="background:${palette.full}">${step.time}${optLabel}</span>
        <div class="lf-popup__type">${step.type}</div>
        <div class="lf-popup__name">${step.name}</div>
      </div>`;

      L.marker([step.lat, step.lng], { icon })
        .addTo(map)
        .bindPopup(popup, { maxWidth:220, closeButton:false });
    });
  });

  /* Vider la queue après initialisation */
  window._pendingMaps = [];
}

/* ── Navigation principale ─────────────────────────────────────── */
function initNav() {
  document.querySelectorAll('.app-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.app-nav-btn').forEach(b => b.classList.remove('active'));
      $(btn.dataset.section).classList.add('active');
      btn.classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});

      /* Initialiser la carte swipe au premier affichage de la section Cartes.
         On ne peut pas le faire dans renderCartes() car le div doit être
         visible (non display:none) avant que Leaflet puisse calculer
         ses dimensions. requestAnimationFrame garantit que le navigateur
         a peint le display:block avant l'appel à L.map().              */
      if (btn.dataset.section === 'section-cartes') {
        /* Double rAF : garantit que le navigateur a peint display:block
           sur section-cartes avant que Leaflet tente de lire les dimensions */
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (typeof initSwipeMap === 'function') initSwipeMap();
          /* Si déjà initialisé (_swipeMapInit), forcer le recalcul des
             dimensions — cas où la section était cachée au premier init */
          const mapEl = document.getElementById('lf-swipe-map');
          if (mapEl && mapEl._swipeMapInst) {
            mapEl._swipeMapInst.invalidateSize();
          }
        }));
      }
    });
  });
}

/* ── Navigation jours ──────────────────────────────────────────── */
function showDay(id) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-selected','false');
  });
  const panel = $(id);
  if (panel) panel.classList.add('active');
  const chip = document.querySelector(`.chip[data-day="${id}"]`);
  if (chip) {
    chip.classList.add('active');
    chip.setAttribute('aria-selected','true');
    chip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
  window.scrollTo({top:0,behavior:'smooth'});

  /* Corriger le bug Leaflet "tuiles invisibles" :
     Leaflet calcule les dimensions au moment de L.map() mais le panneau
     est alors display:none — les dimensions sont 0×0.
     invalidateSize() force Leaflet à recalculer et recharger les tuiles. */
  if (panel && window._leafletMaps) {
    requestAnimationFrame(() => {
      panel.querySelectorAll('.leaflet-map').forEach(el => {
        const mapInst = window._leafletMaps[el.id];
        if (mapInst) mapInst.invalidateSize();
      });
    });
  }
}

/* toggleStory — listener délégué (remplace l'ancien onclick inline) */
function initStoryListeners(root) {
  root.addEventListener('click', e => {
    const btn = e.target.closest('[data-action="toggle-story"]');
    if (!btn) return;
    const drw = btn.nextElementSibling;
    if (!drw) return;
    /* Sauvegarder le label original AVANT de modifier textContent */
    if (!btn.dataset.label) btn.dataset.label = btn.textContent.trim();
    const open = drw.classList.toggle('open');
    btn.textContent = open ? '− Fermer' : btn.dataset.label;
  });
}

function renderMapBlock(d) {
  if (!d.mapSteps && !d.mapLink) return '';

  const mapId = 'lf-' + (d.id || Math.random().toString(36).slice(2));

  /* Légende colorée */
  const seenTypes = new Set();
  const legendItems = (d.mapSteps || [])
    .filter(s => {
      const key = s.type + (s.opt ? '_opt' : '');
      if (seenTypes.has(key)) return false;
      seenTypes.add(key);
      return true;
    })
    .map(s => {
      const palette = MAP_COLORS[s.type] || MAP_COLORS.visite;
      const dotColor = s.opt ? palette.pale : palette.full;
      const label = TYPE_LABELS[s.type] || s.type;
      const optClass = s.opt ? ' map-legend__item--opt' : '';
      const dotOptClass = s.opt ? ' map-legend__dot--opt' : '';
      return `<div class="map-legend__item${optClass}">
        <div class="map-legend__dot${dotOptClass}" style="background:${dotColor}"></div>
        ${esc(s.opt ? label + ' (optionnel)' : label)}
      </div>`;
    }).join('');

  /* Stocker la config dans _pendingMaps directement (pas via script inline —
     innerHTML ignore les <script> par sécurité DOM, ils ne s'exécutent jamais) */
  window._pendingMaps = window._pendingMaps || [];
  window._pendingMaps.push({
    id:     mapId,
    center: d.mapCenter || [43.602, 1.442],
    zoom:   d.mapZoom   || 14,
    steps:  d.mapSteps  || [],
  });

  return `<div class="map-block">
    <div id="${mapId}" class="leaflet-map"></div>
    <div class="map-sheet">
      <div>
        <div class="map-sheet__lbl">
          <svg style="width:11px;height:11px;display:inline;vertical-align:middle;margin-right:3px" viewBox="0 0 24 24" fill="none" stroke="var(--brick)" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3z" stroke-width="1.3"/>
            <line x1="9" y1="4" x2="9" y2="17" stroke-width="1" stroke-dasharray="2 1.5"/>
            <line x1="15" y1="7" x2="15" y2="20" stroke-width="1" stroke-dasharray="2 1.5"/>
          </svg>
          ${esc(d.mapLabel || '')}
        </div>
        <div class="map-sheet__sub">${esc(d.mapSub || '')}</div>
      </div>
      <a class="map-sheet__btn" href="${safeUrl(d.mapLink)}" target="_blank" rel="noopener noreferrer">&#8599; Maps</a>
    </div>
    ${legendItems ? `<div class="map-legend">
      <div class="map-legend__title">Légende</div>
      <div class="map-legend__grid">${legendItems}</div>
    </div>` : ''}
  </div>`;
}

const TYPE_MAP = {
  visite:    { css: 'highlight', ico: ICO.visite    },
  musee:     { css: 'culture',   ico: ICO.musee     },
  restaurant:{ css: 'food',      ico: ICO.restaurant},

  transport: { css: 'transport', ico: ICO.transport },
  spectacle: { css: 'culture',   ico: ICO.spectacle },
  shopping:  { css: 'food',      ico: ICO.shopping  },
};
function stepMeta(s) {
  const p = s.practical || {};
  const parts = [];
  if (p.price)   parts.push(p.price);
  if (p.opening) parts.push(p.opening);
  if (p.address) parts.push(p.address);
  if (s.duration_min) {
    const h = Math.floor(s.duration_min / 60);
    const m = s.duration_min % 60;
    parts.push('~' + (h > 0 ? h + 'h' : '') + (m > 0 ? (h > 0 ? (String(m).padStart(2,'0')) : m + 'min') : ''));
  }
  return parts;
}

function renderStep(s) {
  const t    = TYPE_MAP[s.type] || { css: 'highlight', ico: ICO.visite };
  const p    = s.practical || {};
  const mapsUrl = p.maps_url || null;

  const titleHtml = mapsUrl
    ? `<a href="${safeUrl(mapsUrl)}" target="_blank" rel="noopener noreferrer" class="link-p">${esc(s.name)} 📍</a>`
    : esc(s.name);

  const metaItems = stepMeta(s).map(m=>`<span>${esc(m)}</span>`).join('');

  /* Badges: optional + reservation */
  const badges = [
    s.is_optional         ? `<span class="step-badge step-badge--opt">Optionnel</span>` : '',
    s.reservation_required? `<span class="step-badge step-badge--resa">⚠ Reserver</span>` : '',
  ].join('');

  /* Booking button */
  const bookingHtml = p.booking_url ? `
    <a class="step-book-btn" href="${safeUrl(p.booking_url)}" target="_blank" rel="noopener noreferrer">Reserver →</a>` : '';

  /* Phone */
  const phoneHtml = p.phone ? `
    <a class="step-phone" href="${safeUrl('tel:' + p.phone)}">📞 ${esc(p.phone)}</a>` : '';

  /* Tip */
  const tipHtml = s.tips ? `
    <div class="step-tip">💡 ${esc(s.tips)}</div>` : '';

  /* Story drawer */
  const storyHtml = s.story ? `
    <button class="story-btn" data-action="toggle-story">${esc(s.storyLabel || '+ Histoire du lieu')}</button>
    <div class="story-drw">${esc(s.story)}</div>` : '';

  /* Time display: "09:00" → "9h00" */
  const timeDisplay = s.time ? s.time.replace(':','h').replace(/^0/,'') : '';

  return `<div class="tl-item">
    <div class="tl-time"><span>${esc(timeDisplay)}</span></div>
    <div class="tl-body">
      <div class="tl-dot ${t.css}"></div>
      <div class="tl-card ${t.css}${s.is_optional ? ' tl-card--optional' : ''}">
        <div class="c-type ${t.css}"><span class="svg-type-ico">${t.ico}</span>${esc(s.type)}</div>
        <div class="c-title">${titleHtml}</div>
        ${badges}
        <div class="c-desc">${esc(s.description)}</div>
        <div class="c-meta">${metaItems}</div>
        ${phoneHtml}${bookingHtml}${tipHtml}${storyHtml}
      </div>
    </div>
  </div>`;
}

    ${TRIP.days.map(renderDayPanel).join('')}`;

  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => showDay(c.dataset.day));
  });

  /* Listener délégué ov-card (buttons accessibles au clavier) */
  $('section-programme').addEventListener('click', e => {
    const card = e.target.closest('.ov-card[data-day]');
    if (card) showDay(card.dataset.day);
  });

  /* Listener délégué pour les story drawers — aucun onclick inline */
  initStoryListeners($('section-programme'));
}

/* ── Resto card ────────────────────────────────────────────────── */
function renderRestoCard(r, i) {
  /* Meta grid — depuis r.meta[] si present, sinon construit depuis les champs */
  const metaItems = r.meta || [
    r.address      ? { label: 'Adresse',     value: r.address } : null,
    r.price_range  ? { label: 'Prix',        value: r.price_range } : null,
    r.opening      ? { label: 'Ouvert',      value: r.opening } : null,
    r.reservation_required != null
      ? { label: 'Reservation', value: r.reservation_required ? 'Obligatoire ⚠' : 'Libre' }
      : null,
  ].filter(Boolean);

  const metaHtml  = metaItems.map(m=>`<div class="mi"><span class="mi__lbl">${esc(m.label)}</span><span class="mi__val">${esc(m.value)}</span></div>`).join('');
  const tagsHtml  = (r.tags||[]).map(t=>`<span class="tag" style="background:${t.bg};color:${t.color}">${esc(t.text)}</span>`).join('');

  /* Stars */
  const starsHtml = r.stars ? `
    <div class="stars-row">${esc(r.stars)} <span>${esc(r.starsNote||'')}</span></div>` : '';

  /* Days badge */
  const daysBadge = (r.used_on_days||[]).length
    ? `<div class="rc__days">${r.used_on_days.map(d=>`<span>${esc(d.replace('day','J'))}</span>`).join('')}</div>`
    : '';

  /* Actions */
  const actions = [];
  if (r.maps_url)    actions.push(`<a class="btn-m" href="${safeUrl(r.maps_url)}" target="_blank" rel="noopener noreferrer">📍 Google Maps</a>`);
  if (r.phone)       actions.push(`<a class="btn-m btn-m--blue" href="${safeUrl('tel:' + r.phone)}">📞 ${esc(r.phone)}</a>`);
  if (r.booking_url) actions.push(`<a class="btn-r" href="${safeUrl(r.booking_url)}" target="_blank" rel="noopener noreferrer">🍴 Reserver sur TheFork</a>`);

  /* Verdict label */
  const verdictLabel = r.verdictLabel || 'Notre verdict';

  /* Thumbnail — photo du lieu si disponible, sinon bloc coloré accentColor */
  const thumbHtml = r.photo
    ? `<div class="rc__thumb">
        <img src="${r.photo}" alt="${esc(r.name)}" loading="lazy"
             onerror="this.parentElement.style.display='none'">
      </div>`
    : `<div class="rc__thumb rc__thumb--placeholder" style="background:${r.accentColor||'var(--brick)'}22">
        <span style="font-size:28px">${
          r.category.includes('Jordan') ? '⭐' :
          r.category.includes('Michelin') ? '🌟' :
          r.category.includes('Gault') ? '🏅' :
          r.category.includes('Halle') ? '🏛' : '🍽'
        }</span>
      </div>`;

  return `<div class="rc" id="${r.id}">
    <div class="rc__acc" style="background:${r.accentColor||'var(--brick)'}"></div>
    ${thumbHtml}
    <div class="rc__body">
      <div class="rc__num">0${i+1}</div>
      <div class="rc__cat" style="color:${r.accentColor||'var(--brick)'}">${esc(r.category)}</div>
      <div class="rc__name">${esc(r.name)}</div>
      ${starsHtml}
      ${daysBadge}
      <div class="divider"></div>
      <p class="rc__desc">${esc(r.description)}</p>
      <div class="meta-grid">${metaHtml}</div>
      <div class="tag-row">${tagsHtml}</div>
      <div class="verdict" style="background:${r.verdictBg||'#FFF5F0'};border-left:3px solid ${r.accentColor||'var(--brick)'}">
        <span class="verdict__lbl" style="color:${r.accentColor||'var(--brick)'}">${esc(verdictLabel)}</span>
        ${esc(r.verdict||'')}
      </div>
      <div class="rc-actions">${actions.join('')}</div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   CARTE ITINÉRAIRES — spec complète
   ──────────────────────────────────────────────────────────────────
   État 1 OVERVIEW : tous les points de tous les jours, fitBounds global
                     cards = 4 tuiles de jours
   État 2 JOUR X   : flyTo première étape du jour
                     cards = étapes du jour, step 0 active
                     swipe la carte → point à point
   ══════════════════════════════════════════════════════════════════ */
function initSwipeMap() {
  if (typeof L === 'undefined') return;
  const mapEl   = document.getElementById('lf-swipe-map');
  const track   = document.getElementById('cards-track');
  const backBtn = document.getElementById('map-back-btn');
  if (!mapEl || !track) return;
  if (mapEl._swipeMapInit) return;
  mapEl._swipeMapInit = true;

  /* ── Tuiles CartoDB Voyager ───────────────────────────────────── */
  const swipeMap = L.map(mapEl, {
    scrollWheelZoom: false,
    zoomControl: false,
    attributionControl: false,
    dragging: true,
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
  }).addTo(swipeMap);

  /* Stocker l'instance pour pouvoir appeler invalidateSize() depuis initNav() */
  mapEl._swipeMapInst = swipeMap;

  /* ── État global ─────────────────────────────────────────────── */
  let activeDay   = null;   /* null = overview, sinon index 0-3     */
  let activeStep  = 0;      /* index de l'étape active dans le jour */
  let stepMarkers = [];     /* marqueurs de l'état courant          */
  let observer    = null;   /* IntersectionObserver sur les cards   */
  let _flyLock    = false;  /* verrou anti-reboucle flyTo ↔ swipe   */

  /* ── Couleur par jour (from TRIP.days[].color) ──────────────── */
  /* En overview chaque jour a sa couleur, en mode jour les
     marqueurs reprennent la couleur de type (MAP_COLORS)          */
  const DAY_COLORS = TRIP.days.map(d => d.color || '#D4705A');

  /* ── Construire un marqueur cercle numéroté ──────────────────── */
  function makeMarker(lat, lng, num, color, isActive, isOpt) {
    const bg     = isOpt ? color + '66' : color;
    const border = isActive ? 'rgba(255,255,255,.95)' : 'rgba(255,255,255,.75)';
    const scale  = isActive ? 'scale(1.25)' : 'scale(1)';
    const shadow = isActive ? '0 3px 12px rgba(0,0,0,.35)' : '0 2px 7px rgba(0,0,0,.22)';
    const size   = 30;
    const html = `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${bg};
      border:2.5px solid ${border};
      box-shadow:${shadow};
      display:flex;align-items:center;justify-content:center;
      font-family:'Playfair Display',Georgia,serif;
      font-size:12px;font-weight:700;color:#fff;
      transform:${scale};
      transition:transform .2s ease, box-shadow .2s ease;
      cursor:pointer;
    ">${num}</div>`;

    return L.marker([lat, lng], {
      icon: L.divIcon({ className:'', html, iconSize:[size,size], iconAnchor:[size/2,size/2] }),
    });
  }

  /* ── Nettoyer tous les marqueurs actuels ─────────────────────── */
  function clearMarkers() {
    stepMarkers.forEach(m => swipeMap.removeLayer(m));
    stepMarkers = [];
  }

  /* ── ÉTAT 1 : Overview — tous les points de tous les jours ───── */
  function showOverview() {
    clearMarkers();
    if (observer) { observer.disconnect(); observer = null; }
    activeDay = null;

    /* Masquer le bouton retour */
    if (backBtn) backBtn.style.display = 'none';

    /* Créer les cards de jours */
    track.innerHTML = '';
    TRIP.days.forEach((day, di) => {
      const color = DAY_COLORS[di];
      const card  = document.createElement('div');
      card.className = 'place-card place-card--day';
      card.dataset.day = String(di);
      card.innerHTML = `
        <div class="card-thumb" style="
          background:${color};
          display:flex;align-items:center;justify-content:center;
          font-family:'Playfair Display',Georgia,serif;
          font-size:22px;font-weight:700;color:rgba(255,255,255,.9);
        ">${String(di+1).padStart(2,'0')}</div>
        <div class="card-body">
          <div class="card-text">
            <span class="card-name" style="color:${color}">${esc(day.chipLabel)} — ${esc(day.title)}</span>
            <span class="card-meta">${esc(day.label)}</span>
          </div>
          <svg style="width:18px;height:18px;flex-shrink:0;color:#aaa" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>`;
      card.addEventListener('click', () => showDay(di));
      track.appendChild(card);
    });

    /* Poser tous les points de tous les jours */
    const allPoints = [];
    TRIP.days.forEach((day, di) => {
      const color = DAY_COLORS[di];
      (day.mapSteps || []).forEach(step => {
        const m = makeMarker(step.lat, step.lng, step.num, color, false, step.opt);
        m.on('click', () => showDay(di));
        m.bindTooltip(esc(step.name), { direction:'top', offset:[0,-16], className:'lf-tooltip' });
        m.addTo(swipeMap);
        stepMarkers.push(m);
        allPoints.push([step.lat, step.lng]);
      });
    });

    /* fitBounds sur tous les points avec padding */
    if (allPoints.length > 0) {
      swipeMap.fitBounds(allPoints, { padding: [40, 40], maxZoom: 14 });
    }
  }

  /* ── ÉTAT 2 : Jour sélectionné ───────────────────────────────── */
  function showDay(dayIndex) {
    clearMarkers();
    if (observer) { observer.disconnect(); observer = null; }
    activeDay  = dayIndex;
    activeStep = 0;

    const day   = TRIP.days[dayIndex];
    const steps = day.mapSteps || [];
    if (steps.length === 0) return;

    /* Créer les cards d'étapes */
    track.innerHTML = '';
    const cardEls = [];

    /* ── Card "← Retour" en première position ─────────────────────
       Au même niveau que les cards d'étapes, dans le même carrousel.
       Visuellement cohérente avec les autres cards, sans flotter
       sur la carte ni casser la hiérarchie.                        */
    const backCard = document.createElement('div');
    backCard.className = 'place-card place-card--back';
    backCard.setAttribute('aria-label', 'Retour à la vue d\'ensemble');
    backCard.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span>Tous les jours</span>`;
    backCard.addEventListener('click', showOverview);
    track.appendChild(backCard);

    steps.forEach((step, si) => {
      const palette = MAP_COLORS[step.type] || MAP_COLORS.visite;
      const color   = step.opt ? palette.pale : palette.full;
      const label   = TYPE_LABELS[step.type] || step.type;

      const card = document.createElement('div');
      card.className = 'place-card';
      card.dataset.index = String(si);
      if (si === 0) card.classList.add('active');

      /* Thumbnail : photo du lieu si disponible, sinon bloc coloré + numéro */
      const thumbContent = step.photo
        ? `<img src="${step.photo}" alt="${esc(step.name)}" loading="lazy"
               style="width:100%;height:100%;object-fit:cover;display:block;border-radius:10px"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;
               font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:${color}">${step.num}</div>`
        : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;
               font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:${color}">${step.num}</div>`;

      card.innerHTML = `
        <div class="card-thumb" style="background:${color}22;overflow:hidden;border-radius:10px">
          ${thumbContent}
        </div>
        <div class="card-body">
          <div class="card-text">
            <span class="card-name">${esc(step.name)}</span>
            <span class="card-meta" style="color:${color}">${esc(step.time)} · ${esc(label)}</span>
          </div>
        </div>`;

      card.addEventListener('click', () => selectStep(si, 'card'));
      track.appendChild(card);
      cardEls.push(card);
    });

    /* ── Créer les marqueurs du jour ─────────────────────────────── */
    /* IMPORTANT : on crée ici les marqueurs initiaux (step 0 actif).
       selectStep les recrée entièrement à chaque changement pour
       mettre à jour l'état actif. clearMarkers() est appelé en début
       de selectStep pour éviter la superposition.                   */
    function buildMarkers(activeIdx) {
      clearMarkers();
      steps.forEach((step, si) => {
        const palette = MAP_COLORS[step.type] || MAP_COLORS.visite;
        const color   = step.opt ? palette.pale : palette.full;
        const m = makeMarker(step.lat, step.lng, step.num, color, si === activeIdx, step.opt);
        m.on('click', () => selectStep(si, 'pin'));
        m.addTo(swipeMap);
        stepMarkers.push(m);
      });
    }

    buildMarkers(0);

    /* flyTo sur la première étape */
    swipeMap.flyTo([steps[0].lat, steps[0].lng], 15, { duration: 0.7 });

    /* ── selectStep — synchronise carte ↔ cards ──────────────────
       source = 'card' | 'pin'
       - depuis card → flyTo + rebuilder les marqueurs
       - depuis pin  → scroller la card + rebuilder les marqueurs  */
    function selectStep(idx, source) {
      /* Reconstruire les marqueurs avec le bon état actif */
      buildMarkers(idx);

      /* Classes CSS des cards */
      cardEls.forEach((el, i) => el.classList.toggle('active', i === idx));

      if (source === 'pin') {
        /* Pin cliqué → scroller la card correspondante */
        const card = cardEls[idx];
        if (card) {
          const target = card.offsetLeft - (track.clientWidth / 2) + (card.offsetWidth / 2);
          track.scrollTo({ left: target, behavior: 'smooth' });
        }
      }

      if (source === 'card') {
        /* Tap card → flyTo + verrou pour éviter le reboucle observer */
        _flyLock = true;
        swipeMap.flyTo([steps[idx].lat, steps[idx].lng], 15, { duration: 0.5 });
        /* Déverrouiller après la fin de l'animation (~600ms) */
        setTimeout(() => { _flyLock = false; }, 650);
      }

      /* source === 'swipe' : scroll initié par l'utilisateur
         → on déplace seulement la carte, sans scroller les cards (déjà en position) */
      if (source === 'swipe') {
        _flyLock = true;
        swipeMap.flyTo([steps[idx].lat, steps[idx].lng], 15, { duration: 0.5 });
        setTimeout(() => { _flyLock = false; }, 650);
      }

      activeStep = idx;
    }

    /* IntersectionObserver — détecter la card centrée au swipe
       On observe uniquement les cards d'étapes (pas la card retour)
       _flyLock : pendant un flyTo programmatique, on ignore l'observer
       pour éviter la boucle flyTo → scroll card → observer → flyTo  */
    observer = new IntersectionObserver(entries => {
      if (_flyLock) return;
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.65) {
          const idx = parseInt(entry.target.dataset.index, 10);
          if (!isNaN(idx) && idx !== activeStep) selectStep(idx, 'swipe');
        }
      });
    }, { root: track, threshold: 0.65 });
    cardEls.forEach(c => observer.observe(c));

    /* Card "← Retour" aussi en dernière position — pattern bookend :
       disponible au début ET à la fin pour ne jamais forcer
       l'utilisateur à scroller en arrière pour quitter un jour. */
    const backCardEnd = document.createElement('div');
    backCardEnd.className = 'place-card place-card--back';
    backCardEnd.setAttribute('aria-label', 'Retour à la vue d\'ensemble');
    backCardEnd.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span>Tous les jours</span>`;
    backCardEnd.addEventListener('click', showOverview);
    track.appendChild(backCardEnd);

    activeStep = 0;
  }

  /* ── Lancement : overview ────────────────────────────────────── */
  /* Double rAF : garantit que le navigateur a peint la section
     (même si elle était display:none) avant fitBounds().
     invalidateSize() force Leaflet à recalculer les dimensions.  */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    swipeMap.invalidateSize();
    showOverview();
  }));
}

/* ── Section PRATIQUE — contextuelle (style SNCF anticipatoire) ── */
function renderPratique() {

  /* ── Calcul du jour actif (timezone-safe) ─────────────────────── */
  const [sy, sm, sd] = TRIP.meta.tripStart.split('-').map(Number);
  const start  = new Date(sy, sm - 1, sd);
  const today  = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diff   = Math.round((todayMidnight - start) / 86400000);
  const dayIdx  = (diff >= 0 && diff < TRIP.days.length) ? diff : 0;
  const day     = TRIP.days[dayIdx];
  const JOURS   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const todayLabel = JOURS[today.getDay()] + ' ' + today.getDate();

  /* ── Alertes contextuelles ─────────────────────────────────────── */
  /* Construites depuis les données TRIP — zéro saisie supplémentaire */
  const alerts = [];

  /* 1. Train : remonte si J3 (trainBanner) aujourd'hui ou dans 1-2 jours */
  const trainDayIdx = TRIP.days.findIndex(d => d.trainBanner);
  if (trainDayIdx !== -1) {
    const delta = trainDayIdx - dayIdx;
    if (delta === 0) {
      const tb = TRIP.days[trainDayIdx].trainBanner;
      alerts.push({
        urgency: 'now',
        icon: '🚆',
        title: 'Aujourd\'hui : ' + esc(tb.label),
        body:  esc(tb.info),
        badge: 'Maintenant',
        btnLabel: 'Réserver sur SNCF',
        btnUrl:   'https://www.oui.sncf',
      });
    } else if (delta === 1) {
      const tb = TRIP.days[trainDayIdx].trainBanner;
      alerts.push({
        urgency: 'soon',
        icon: '🚆',
        title: 'Demain : ' + esc(tb.label),
        body:  esc(tb.info) + ' · Pense à réserver si ce n\'est pas fait.',
        badge: 'Demain',
        btnLabel: 'Réserver sur SNCF',
        btnUrl:   'https://www.oui.sncf',
      });
    } else if (delta === 2) {
      const tb = TRIP.days[trainDayIdx].trainBanner;
      alerts.push({
        urgency: 'upcoming',
        icon: '🚆',
        title: 'Dans 2 jours : excursion Carcassonne',
        body:  esc(tb.info),
        badge: 'Dans 2 jours',
        btnLabel: 'Réserver sur SNCF',
        btnUrl:   'https://www.oui.sncf',
      });
    }
  }

  /* 2. Réservations urgentes : steps reservation_required sur J+1 */
  const tomorrow = TRIP.days[dayIdx + 1];
  if (tomorrow && tomorrow.steps) {
    tomorrow.steps.filter(s => s.reservation_required).forEach(s => {
      const p = s.practical || {};
      alerts.push({
        urgency: 'soon',
        icon: '🍽',
        title: 'Demain : ' + esc(s.name),
        body:  (p.opening ? esc(p.opening) : '') + ' · Complet rapidement.',
        badge: 'Réserver maintenant',
        btnLabel: 'Réserver',
        btnUrl:   p.booking_url || null,
      });
    });
  }

  /* 3. Réservations urgentes sur le jour actif non encore passées */
  if (day && day.steps) {
    const nowH = today.getHours() * 60 + today.getMinutes();
    day.steps.filter(s => s.reservation_required).forEach(s => {
      const stepH = s.time ? (parseInt(s.time.split(':')[0]) * 60 + parseInt(s.time.split(':')[1])) : 9999;
      if (stepH > nowH) {
        const p = s.practical || {};
        alerts.push({
          urgency: 'now',
          icon: '🍽',
          title: 'Ce soir : ' + esc(s.name),
          body:  p.opening ? esc(p.opening) : '',
          badge: 'Ce soir',
          btnLabel: 'Réserver',
          btnUrl:   p.booking_url || null,
        });
      }
    });
  }

  /* ── Render alertes ────────────────────────────────────────────── */
  const URGENCY_STYLE = {
    now:      { border: 'var(--brick)',     bg: 'var(--peche)',  badgeBg: 'var(--brick)',     badgeColor: '#fff' },
    soon:     { border: 'var(--gold)',      bg: 'var(--sable)',  badgeBg: 'var(--gold)',      badgeColor: '#fff' },
    upcoming: { border: 'var(--transport)', bg: 'var(--ciel)',   badgeBg: 'var(--transport)', badgeColor: '#fff' },
  };

  const alertsHtml = alerts.map(a => {
    const s = URGENCY_STYLE[a.urgency] || URGENCY_STYLE.upcoming;
    const btn = a.btnUrl
      ? `<a class="prat-alert__btn" href="${safeUrl(a.btnUrl)}" target="_blank" rel="noopener noreferrer">${esc(a.btnLabel)} →</a>`
      : '';
    return `<div class="prat-alert" style="border-left-color:${s.border};background:${s.bg}">
      <div class="prat-alert__top">
        <span class="prat-alert__ico">${a.icon}</span>
        <span class="prat-alert__badge" style="background:${s.badgeBg};color:${s.badgeColor}">${esc(a.badge)}</span>
      </div>
      <div class="prat-alert__title">${a.title}</div>
      ${a.body ? `<div class="prat-alert__body">${a.body}</div>` : ''}
      ${btn}
    </div>`;
  }).join('');

  /* ── Hotel card ────────────────────────────────────────────────── */
  const hotelHtml = (TRIP.hotel && TRIP.hotel.name) ? `
    <div class="prat-row prat-row--hotel">
      <span class="prat-row__ico">🏨</span>
      <div class="prat-row__body">
        <div class="prat-row__title">${esc(TRIP.hotel.name)}</div>
        <div class="prat-row__sub">
          ${TRIP.hotel.address ? esc(TRIP.hotel.address) + '&nbsp;' : ''}
          ${TRIP.hotel.checkin ? '· Check-in ' + esc(TRIP.hotel.checkin) : ''}
        </div>
      </div>
      <div class="prat-row__actions">
        ${TRIP.hotel.mapsUrl ? `<a class="prat-row__btn" href="${safeUrl(TRIP.hotel.mapsUrl)}" target="_blank" aria-label="Voir l'hôtel sur Google Maps">📍</a>` : ''}
        ${TRIP.hotel.phone   ? `<a class="prat-row__btn" href="${safeUrl('tel:' + TRIP.hotel.phone)}" aria-label="Appeler l'hôtel">📞</a>` : ''}
      </div>
    </div>` : `
    <div class="prat-row prat-row--hotel prat-row--empty">
      <span class="prat-row__ico">🏨</span>
      <div class="prat-row__body">
        <div class="prat-row__title">Hébergement</div>
        <div class="prat-row__sub" style="font-style:italic;color:var(--text-muted)">À confirmer — infos à venir</div>
      </div>
    </div>`;

  /* ── Infos permanentes : 3 niveaux ────────────────────────────── */
  /* Icônes SVG Lucide en --text-muted : neutres, informationnelles,
     ne concurrencent pas les éléments interactifs en --brick         */
  const ALWAYS = [
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><circle cx="8.5" cy="17" r="1.5"/><circle cx="15.5" cy="17" r="1.5"/><path d="m9 21-1-4"/><path d="m15 21 1-4"/></svg>`, text: 'Metro A+B · 1,80€/ticket · Bus · VeloToulouse partout en libre-service' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><path d="m9 20 3-6 3 6"/><path d="m6 8 6 2 6-2"/><line x1="12" y1="10" x2="12" y2="14"/></svg>`, text: 'Centre historique entierement pieton — meilleur mode de decouverte' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.69a16 16 0 0 0 6.29 6.29l.98-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`, text: 'SAMU 15 · Police 17 · Pompiers 18 · Europeen 112' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`, text: 'Budget repas : petit-dej ~15€/j · dej ~50-70€ · diner leger ~25-30€ · max 100€/j pour 2' },
  ];

  /* Niveau 2 : En cas de besoin — icônes SVG Lucide en --text-muted
     Souvenirs : fleur (violette de Toulouse) ≠ sac shopping (step actif) */
  const NEED = [
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><line x1="9" y1="2" x2="9" y2="22"/></svg>`, text: 'Pass Musees Toulouse Metropole ~25€ — acces musees municipaux, rentable des 3 visites — office de tourisme' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`, text: 'Printemps ideal · veste legere le soir · risque d\'averse en avril · creme solaire' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`, text: 'SNCF Connect (trains) · VeloToulouse (velos) · Citymapper (transports) · TheFork (restos)' },
    /* Fleur SVG = violette de Toulouse — icône distincte du sac shopping */
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 2 Q14 7 12 10"/><path d="M12 2 Q10 7 12 10"/><path d="M22 12 Q17 14 14 12"/><path d="M22 12 Q17 10 14 12"/><path d="M12 22 Q14 17 12 14"/><path d="M12 22 Q10 17 12 14"/><path d="M2 12 Q7 14 10 12"/><path d="M2 12 Q7 10 10 12"/></svg>`, text: 'Souvenirs : Violettes de Toulouse (Maison Florentine, Rue Alsace-Lorraine) · Saucisson & foie gras (Maison Garcia, Rue du Taur) · Vins de Fronton (cave Nicolas Capitole) · Gimblettes & cassoulet en bocal (marché Victor Hugo)' },
  ];

  const alwaysHtml = ALWAYS.map(i =>
    `<div class="prat-line"><span class="prat-line__ico">${i.ico}</span><span>${esc(i.text)}</span></div>`
  ).join('');

  const needHtml = NEED.map(i =>
    `<div class="prat-line prat-line--muted"><span class="prat-line__ico">${i.ico}</span><span>${esc(i.text)}</span></div>`
  ).join('');

  /* ── Liens utiles ──────────────────────────────────────────────── */
  const linksHtml = (TRIP.usefulLinks||[]).map(l=>
    `<a class="useful-link" href="${safeUrl(l.url)}" target="_blank" rel="noopener noreferrer">
       <span>${esc(l.label)}</span><span class="useful-link__arr">↗</span>
     </a>`).join('');

  /* ── Photos album ──────────────────────────────────────────────── */
  const photosHtml = TRIP.meta.googlePhotosUrl ? `
    <div class="photos-ban" style="margin:0 13px 13px"><div class="photos-ban__in">
      <div class="photos-ban__ico">📸</div>
      <div><div class="photos-ban__lbl">Album souvenir</div>
           <div class="photos-ban__sub">Photos &amp; videos du sejour</div></div>
      <a class="photos-ban__btn" href="${safeUrl(TRIP.meta.googlePhotosUrl)}" target="_blank" rel="noopener noreferrer">Ouvrir &rarr;</a>
    </div></div>` : '';

  /* ── Assemblage final ──────────────────────────────────────────── */
  $('section-pratique').innerHTML = `
    <div class="prat-hdr">
      <div class="prat-hdr__tag">Aujourd'hui · ${esc(todayLabel)}</div>
      <h1>Infos pratiques</h1>
    </div>

    ${photosHtml}

    ${alertsHtml ? `<div class="prat-alerts">${alertsHtml}</div>` : ''}

    <div class="prat-section">
      ${hotelHtml}
    </div>

    <div class="prat-section">
      <div class="prat-section__ttl">Toujours utile</div>
      ${alwaysHtml}
    </div>

    <div class="prat-section">
      <div class="prat-section__ttl">En cas de besoin</div>
      ${needHtml}
    </div>

    ${linksHtml ? `<div class="prat-section">
      <div class="prat-section__ttl">Liens utiles</div>
      <div style="display:flex;flex-direction:column;gap:7px">${linksHtml}</div>
    </div>` : ''}`;
}

/* ── Auto-select today ─────────────────────────────────────────── */
function autoSelectDay() {
  /* Calcul timezone-safe : compare les dates en heure locale */
  const [sy, sm, sd] = TRIP.meta.tripStart.split('-').map(Number);
  const start = new Date(sy, sm - 1, sd);          /* minuit heure locale */
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff  = Math.round((today - start) / 86400000);
  if (diff >= 0 && diff < TRIP.days.length) {
    showDay(TRIP.days[diff].id);
  } else {
    showDay(TRIP.days[0].id);
  }
}

/* ── Boot ──────────────────────────────────────────────────────── */
(function init() {
  try {
    /* Update meta tags from TRIP data — single source of truth */
    const emoji = TRIP.meta.coverEmoji || '✈';
    document.getElementById('page-title').textContent      = TRIP.meta.title + ' — Notre Voyage ' + emoji;
    document.getElementById('meta-og-title').content       = TRIP.meta.title + ' — Notre Voyage ' + emoji;
    document.getElementById('meta-description').content    = TRIP.meta.subtitle + ' · ' + TRIP.days.length + ' jours';
    document.getElementById('meta-og-description').content = TRIP.meta.subtitle + ' · ' + TRIP.days.length + ' jours';
    document.getElementById('meta-og-url').content         = location.href;
    document.getElementById('page-icon').href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>${emoji}</text></svg>`;

    renderProgramme();
    /* initAllMaps() doit être appelé APRÈS renderProgramme() car c'est
       renderDayPanel() (appelé par renderProgramme) qui injecte les divs
       Leaflet dans le DOM via renderMapBlock(). Leaflet a besoin que les
       divs existent avant d'appeler L.map() dessus.
       requestAnimationFrame garantit que le navigateur a eu le temps
       de peindre le DOM avant qu'on initialise les cartes.            */
    requestAnimationFrame(initAllMaps);
    renderRestos();
    renderCartes();
    renderPratique();
    initNav();
    autoSelectDay();
  } catch (err) {
    console.error('[Voyage] Erreur au démarrage :', err);
    document.body.innerHTML = `<div style="font-family:sans-serif;padding:32px;text-align:center;color:#C2410C">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <strong>Impossible de charger le guide.</strong><br>
      <span style="font-size:13px;color:#888;margin-top:8px;display:block">
        Vérifiez la syntaxe du BLOC 1 (TRIP_DATA) — virgule ou accolade manquante ?
      </span>
    </div>`;
  }
})();
</script>
