<!-- =====================================================================
  BLOC 2 — DESIGN SYSTEM
  ======================================================================
  Modifiez ici pour changer couleurs, polices, espacements.
  Ne touchez pas ce bloc pour changer le contenu du voyage.
  Tokens CSS dans :root — une seule valeur par variable.
  ===================================================================== -->
<style>
/* TOKENS */
:root {
  /* ── Palette chaude (source de vérité — inchangée) ─────────────── */
  --brick:        #D4705A;
  --brick-hover:  #C4604A;
  --brick-pastel: #F2C4A8;
  --ocre:         #E8956A;
  --violette:     #9B7BAA;
  --pastel-bleu:  #7B9EBB;
  --gold:         #D4A853;
  --gold-light:   #E8C4A8;
  --transport:    #6B8E9F;

  --cream:        #FDF5F0;
  --cream-dark:   #EDE3D3;
  --peche:        #FAE8DC;
  --rose-dragee:  #F5D5E2;
  --lilas:        #EAD8F0;
  --ciel:         #D8EAF5;
  --sable:        #F5EAD8;

  --dark:         #3D1F1A;
  --medieval:     #4A3728;
  --bordeaux:     #6B3A40;
  --stone:        #8B7355;
  --text:         #3D2B1F;
  --text-muted:   #B87A6A;

  /* ── Surfaces (nouveau — permet le dark mode) ────────────────── */
  --surface:       var(--cream);          /* fond page                    */
  --surface-alt:   #fff;                  /* cards                        */
  --surface-elev:  #fff;                  /* éléments flottants           */
  --surface-ink:   var(--dark);           /* nav bottom, headers dark     */
  --border:        var(--cream-dark);     /* séparateurs subtils          */
  --border-strong: rgba(61,31,26,.12);    /* séparateurs contrastés       */

  /* ── Typographie ────────────────────────────────────────────── */
  --f-display: 'Playfair Display', serif;
  --f-body:    'DM Sans', sans-serif;
  --f-italic:  'Cormorant Garamond', serif;

  /* ── Radius modernisés (+50% sur les grandes valeurs) ────────── */
  /* Les apps 2025+ (Airbnb, Hopper, Apple Liquid Glass) utilisent
     des squircles plus généreux. On passe de 8/14 à 12/20 pour
     aligner avec l'ère "fluid dimensionality" post-flat design.   */
  --r-xs:  6px;
  --r:     12px;   /* était 8  — standard cards/inputs             */
  --r-sm:  8px;    /* était 4  — badges, chips, tags               */
  --r-lg:  20px;   /* était 14 — cards principales, map-block      */
  --r-xl:  28px;   /* nouveau — hero, modals, bottom sheets        */
  --r-pill: 999px; /* chips, pills                                 */

  /* ── Ombres cinématographiques ───────────────────────────────── */
  /* Pattern "lift" : une ombre courte pour le contact au support
     + une ombre longue diffuse pour l'aura. Donne du poids sans
     l'effet "flou 2021".                                          */
  --shadow-xs:   0 1px 2px rgba(44,24,16,.06);
  --shadow:      0 1px 2px rgba(44,24,16,.06), 0 4px 12px rgba(44,24,16,.08);
  --shadow-md:   0 2px 4px rgba(44,24,16,.08), 0 8px 20px rgba(44,24,16,.10);
  --shadow-deep: 0 2px 6px rgba(44,24,16,.10), 0 16px 40px rgba(44,24,16,.14);
  --shadow-float:0 4px 12px rgba(44,24,16,.12), 0 24px 48px rgba(44,24,16,.16);

  /* ── Glass effect (Liquid Glass inspiration) ─────────────────── */
  --glass-bg:     rgba(253,245,240,.72);
  --glass-border: rgba(61,31,26,.08);
  --glass-blur:   blur(20px) saturate(180%);

  /* ── Hero headers (Programme, Restos, Pratique) ─────────────────
     3 couleurs chaudes qui dégradent doucement — l'âme romantique
     de l'app. Ces tokens basculent en dark mode (voir @media plus bas)
     pour éviter le halo crème cramé sur fond brun profond.         */
  --hero-warm-1: #F5D5E2;  /* rose-dragée — point chaud principal   */
  --hero-warm-2: #FAE8DC;  /* pêche        — transition douce       */
  --hero-warm-3: #F2C4A8;  /* brick-pastel — accent chaleureux      */
  --hero-title:  var(--text);    /* couleur titre par défaut = text */

  /* ── Navigation ──────────────────────────────────────────────── */
  --nav-h:    64px;
  --safe-btm: env(safe-area-inset-bottom, 0px);
  --pb:       calc(var(--nav-h) + var(--safe-btm) + 12px); /* +12 pour la nav flottante */
}

/* ── Dark mode automatique via prefers-color-scheme ──────────────
   On garde l'âme chaude/éditoriale : pas de gris bleu froid, mais
   un brun-bordeaux profond avec accents dorés. L'identité reste
   cohérente le jour et la nuit.                                   */
@media (prefers-color-scheme: dark) {
  :root {
    --surface:       #1C0F0C;         /* brun très profond           */
    --surface-alt:   #2A1913;         /* cards : un cran plus clair  */
    --surface-elev:  #33201A;         /* éléments flottants          */
    --surface-ink:   #120807;         /* nav bottom encore plus noir */
    --text:          #F5E9DC;         /* crème chaud lisible         */
    --text-muted:    #B08C7A;         /* muted chaud                 */
    --cream:         #1C0F0C;
    --cream-dark:    #2A1913;
    --border:        rgba(245,233,220,.08);
    --border-strong: rgba(245,233,220,.16);

    /* Les couleurs saturées : on pousse la luminosité pour garder
       le contraste AA sur fond sombre.                             */
    --brick:         #F08A70;
    --brick-hover:   #FF9C82;
    --gold:          #E8BC63;
    --gold-light:    #F5D888;
    --bordeaux:      #D98A8A;

    --glass-bg:      rgba(42,25,19,.72);
    --glass-border:  rgba(245,233,220,.08);

    /* Hero dark : au lieu du rose/pêche (qui crament sur fond sombre),
       on utilise 3 bruns chauds saturés — wine, terracotta, cuivre —
       qui préservent l'ADN romantique sans perdre en lisibilité.
       Ces teintes se fondent doucement dans le --surface et créent un
       effet de halo chaleureux cohérent avec l'identité éditoriale.  */
    --hero-warm-1: #4A1F22;  /* wine profond                          */
    --hero-warm-2: #3A1812;  /* brun cacao                            */
    --hero-warm-3: #52261F;  /* terracotta brûlée                     */
    --hero-title:  var(--text);

    --shadow-xs:   0 1px 2px rgba(0,0,0,.4);
    --shadow:      0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.5);
    --shadow-md:   0 2px 4px rgba(0,0,0,.5), 0 8px 20px rgba(0,0,0,.6);
    --shadow-deep: 0 2px 6px rgba(0,0,0,.5), 0 16px 40px rgba(0,0,0,.6);
    --shadow-float:0 4px 12px rgba(0,0,0,.6), 0 24px 48px rgba(0,0,0,.7);
  }
}

/* RESET */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--f-body);background:var(--surface);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:var(--pb)}

/* APP SHELL */
.app-section{display:none;min-height:100dvh}
.app-section.active{display:block;animation:fadeUp .25s ease both}
/* Exception : la section Cartes ne doit PAS être animée car Leaflet
   s'initialise pendant l'animation et calcule mal les dimensions du
   container en mouvement. Apparition instantanée = tuiles stables.   */
#section-cartes.active{animation:none}

/* ── BOTTOM NAV flottante avec glass effect ──────────────────────
   Pattern 2025+ : décollée des bords, arrondie, backdrop-filter.
   Apple Liquid Glass, Airbnb 2025, Hopper 2024 utilisent ce pattern.
   Le glass laisse percevoir le contenu qui défile dessous, ce qui
   signale la persistance de la nav sans la rendre opaque.          */
.app-nav{
  position:fixed;
  bottom:calc(var(--safe-btm) + 10px);
  left:12px; right:12px;
  z-index:300;
  height:var(--nav-h);
  background:var(--glass-bg);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow-float);
  display:flex;
  justify-content:space-around;
  padding:0;
}
/* Fallback si backdrop-filter non supporté : on force un fond opaque.
   Détection via @supports not — pattern standard, pas de nesting.   */
@supports not ((backdrop-filter: blur(20px)) or (-webkit-backdrop-filter: blur(20px))) {
  .app-nav{background:var(--surface-alt)}
}
.app-nav-btn{
  flex:1;min-height:var(--nav-h);
  padding:10px 4px 8px;
  background:none;border:none;
  color:var(--text-muted);
  font-family:var(--f-body);font-size:10px;font-weight:500;
  letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  transition:color .2s, transform .15s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.app-nav-btn:active{transform:scale(.92)}
.app-nav-btn .ni{width:22px;height:22px;line-height:1;display:flex;align-items:center;justify-content:center}
.app-nav-btn .ni svg{width:22px;height:22px;display:block}
.app-nav-btn.active{color:var(--brick)}
/* Pill de fond sur l'état actif — plus moderne que la barre top fine */
.app-nav-btn.active::before{
  content:'';
  position:absolute;
  top:8px;bottom:8px;left:8px;right:8px;
  background:color-mix(in srgb, var(--brick) 14%, transparent);
  border-radius:var(--r);
  z-index:-1;
}
@supports not (background: color-mix(in srgb, red, blue)) {
  .app-nav-btn.active::before{background:rgba(212,112,90,.14)}
}

/* ── HERO & HEADERS — système unifié ─────────────────────────────
   Les 3 pages (Programme, Restos, Pratique) partagent la même
   structure visuelle via les tokens --hero-warm-* qui basculent en
   dark mode. Gradient linéaire doux 3 couleurs pour l'ADN romantique
   de l'app : c'est le "rose d'avant" que tu avais en clair, et une
   palette de bruns chauds wine/terracotta en dark mode — aucun
   halo crème qui cramerait sur fond sombre.                       */
.hero-c{
  background:linear-gradient(
    160deg,
    var(--hero-warm-1) 0%,
    var(--hero-warm-2) 45%,
    var(--hero-warm-3) 100%
  );
  padding:40px 24px 28px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
/* Motif décoratif subtil (conservé) */
.hero-c::before{
  content:'';
  position:absolute;
  inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C4705A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;
  opacity:.7;
}
/* En dark mode le motif brick ressort trop fort sur les bruns — on l'atténue */
@media (prefers-color-scheme: dark) {
  .hero-c::before{opacity:.3}
}
.hero-c__tag{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--text-muted);font-weight:500;
  margin-bottom:12px;position:relative;
}
/* En clair, le tag est sur fond rose — on fonce la couleur pour le contraste.
   En dark, --text-muted est déjà bien lisible sur --hero-warm-*.             */
@media (prefers-color-scheme: light) {
  .hero-c__tag{color:var(--bordeaux);opacity:.75}
}
/* Titre éditorial magazine */
.hero-c__title{
  font-family:var(--f-display);
  font-size:clamp(32px,9vw,46px);
  color:var(--hero-title);
  line-height:1.05;
  letter-spacing:-.01em;
  position:relative;
}
.hero-c__title em{color:var(--brick);font-style:italic}
.hero-c__amp{
  font-family:var(--f-italic);
  font-size:.6em;
  color:color-mix(in srgb, var(--hero-title) 22%, transparent);
  display:inline-block;
  margin:0 4px;
  vertical-align:baseline;
}
@supports not (background: color-mix(in srgb, red, blue)) {
  .hero-c__amp{color:rgba(61,31,26,.22)}
}
.hero-c__sub{
  font-family:var(--f-italic);
  font-size:16px;font-style:italic;
  color:var(--bordeaux);
  margin-top:8px;position:relative;
}
.hero-c__stats{
  display:flex;justify-content:center;gap:32px;
  margin-top:20px;position:relative;
}
.hero-stat strong{
  display:block;
  font-family:var(--f-display);
  font-size:26px;color:var(--brick);
  line-height:1;
  letter-spacing:-.02em;
}
.hero-stat span{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);
  margin-top:4px;display:inline-block;
}

/* ── CHIPS modernisés ────────────────────────────────────────────
   2026 : on abandonne le dot décoratif (daté Spotify 2022) pour un
   look plus sobre. La forme pill reste (universelle), mais on joue
   sur la matière : fond sombre avec subtle glass effect.           */
.chips-wrap{
  position:sticky;top:0;z-index:200;
  background:var(--surface-ink);
  padding:12px 12px;
  display:flex;gap:8px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid rgba(255,255,255,.06);
  -webkit-overflow-scrolling:touch;
}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;
  min-height:40px;
  padding:9px 18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r-pill);
  color:rgba(255,255,255,.6);
  font-family:var(--f-body);
  font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap;
  transition:all .2s ease;
  display:flex;align-items:center;
  -webkit-tap-highlight-color:transparent;
}
.chip:active{transform:scale(.95)}
.chip.active{
  background:var(--brick);
  border-color:var(--brick);
  color:#fff;
  font-weight:600;
  box-shadow:0 2px 8px rgba(212,112,90,.35);
}
.chip:hover:not(.active){background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
/* Le chip__dot est conservé dans le HTML pour compat mais masqué */
.chip__dot{display:none}

/* DAY PANELS */
.day-panel{display:none}
.day-panel.active{display:block}

/* DAY HEADER */
.day-hdr{padding:32px 24px 20px;position:relative;overflow:hidden}
.day-bgnum{position:absolute;top:-15px;right:-5px;font-family:var(--f-italic);font-size:140px;font-weight:300;color:var(--cream-dark);line-height:1;user-select:none;pointer-events:none;opacity:.9}
.day-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--brick);font-weight:600;margin-bottom:7px;position:relative}
.day-ttl{
  font-family:var(--f-display);
  font-size:clamp(26px, 7vw, 38px);
  color:var(--text);
  line-height:1.05;
  margin-bottom:6px;
  letter-spacing:-.01em;
  position:relative;
}
.day-sub{font-family:var(--f-italic);font-size:15px;font-style:italic;color:var(--text-muted);position:relative}

/* MAP BLOCK — Leaflet remplace les anciennes iframes OSM */
.map-block{margin:0 16px 20px;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-deep)}
/* Le div Leaflet a besoin d'une hauteur explicite — les iframes l'avaient implicitement */
.map-block .leaflet-map{
  width:100%;height:240px;display:block;
  background:#f2ede4;
  position:relative;
  /* Force GPU pour rendu des tuiles sur mobile */
  transform:translateZ(0);
}
/* Fade-in des tuiles quand prêtes + loader pendant le chargement */
.map-block .leaflet-map:not(.lf-ready) .leaflet-tile-container{opacity:0}
.map-block .leaflet-map.lf-ready .leaflet-tile-container{
  opacity:1;
  transition:opacity .28s ease;
}
.map-block .leaflet-map:not(.lf-ready)::after{
  content:'';
  position:absolute;
  top:50%;left:50%;
  width:26px;height:26px;
  margin:-13px 0 0 -13px;
  border:2px solid rgba(61,43,31,.12);
  border-top-color:var(--brick);
  border-radius:50%;
  animation:lf-spin .9s linear infinite;
  z-index:1;
  pointer-events:none;
}
.map-block .leaflet-map.lf-ready::after{display:none}

/* Surcharge du popup Leaflet par défaut — on le fait correspondre au design system.
   Fond basculable via --surface-alt pour supporter le dark mode : sans ça, Leaflet
   impose un fond blanc qui devient illisible sur carte sombre.                  */
.leaflet-popup-content-wrapper{
  border-radius:var(--r) !important;
  box-shadow:var(--shadow-deep) !important;
  border:none;padding:0;overflow:hidden;
  font-family:var(--f-body) !important;
  background:var(--surface-alt) !important;
  color:var(--text) !important;
}
.leaflet-popup-content{margin:0 !important}
.leaflet-popup-tip-container{display:none}  /* on supprime la petite flèche */
.leaflet-popup-close-button{display:none}

/* Popup interne */
.lf-popup{padding:11px 13px;min-width:170px}
.lf-popup__badge{
  display:inline-block;color:#fff;font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:9px;margin-bottom:5px;
}
.lf-popup__type{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--text-muted);margin-bottom:2px}
.lf-popup__name{font-family:var(--f-display);font-size:14px;color:var(--text);line-height:1.25}

/* Marqueurs circulaires — générés en JS via L.divIcon */
.lf-mkr{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);font-size:11px;font-weight:700;color:#fff;
  border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
/* Optionnel : fond pâle + bord pointillé + texte semi-transparent */
.lf-mkr--opt{
  border-style:dashed;
  border-color:rgba(0,0,0,.18);
  color:rgba(61,31,26,.65);
  box-shadow:0 1px 5px rgba(0,0,0,.12);
}

/* LÉGENDE — tuiles colorées sous la carte */
/* Chaque tuile reprend exactement la couleur du marqueur correspondant
   pour créer une cohérence visuelle parfaite entre carte et légende.  */
.map-legend{
  background:var(--surface-alt);
  border-top:1px solid var(--cream-dark);
  padding:10px 14px 12px;
}
.map-legend__title{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);font-weight:600;margin-bottom:4px;
}
/* Note sémantique : explique que la carte montre les destinations,
   pas les trajets. Permet au user de ne pas chercher en vain des
   pins pour "marche 5 min vers X".                                  */
.map-legend__hint{
  font-family:var(--f-italic);
  font-size:12px;font-style:italic;
  color:var(--text-muted);
  line-height:1.45;
  margin-bottom:10px;
  opacity:.85;
}
.map-legend__grid{
  display:flex;flex-wrap:wrap;gap:5px;
}
/* Chaque tuile de légende */
.map-legend__item{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 9px 4px 5px;
  border-radius:12px;
  background:var(--cream);
  font-size:11px;font-weight:600;color:var(--text);
  border:1px solid var(--cream-dark);
}
/* Le petit cercle coloré dans la tuile — même couleur que le marqueur */
.map-legend__dot{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.8);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
/* Tuile optionnelle : fond pâle + bord pointillé */
.map-legend__item--opt{
  opacity:.75;
  border-style:dashed;
}
.map-legend__dot--opt{
  border-style:dashed;
  border-color:rgba(0,0,0,.15);
}
.map-sheet{background:var(--surface-alt);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.map-sheet__lbl{font-size:11px;font-weight:600;color:var(--text)}
.map-sheet__sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.map-sheet__btn{flex-shrink:0;display:inline-flex;align-items:center;background:var(--brick);color:#fff;text-decoration:none;font-family:var(--f-body);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:10px 18px;border-radius:var(--r-pill);min-height:44px;white-space:nowrap;transition:background .2s, transform .15s;-webkit-tap-highlight-color:transparent}
.map-sheet__btn:active{transform:scale(.95)}
.map-sheet__btn:hover{background:var(--brick-hover)}

/* CULTURE BOX */
.cult-box{margin:0 16px 20px;background:linear-gradient(135deg,var(--dark) 0%,var(--medieval) 100%);color:#fff;padding:20px 16px;border-radius:var(--r);position:relative;overflow:hidden}
.cult-box::before{content:'📖';position:absolute;top:-8px;right:14px;font-size:56px;opacity:.07;pointer-events:none}
.cult-box__tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px;opacity:.8}
.cult-box h3{font-family:var(--f-display);font-size:17px;margin-bottom:8px;color:#fff}
.cult-box p{font-family:var(--f-italic);font-size:14px;line-height:1.7;color:rgba(255,255,255,.75);font-style:italic}
.cult-facts{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.cult-fact{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:5px 10px;border-radius:var(--r-sm);font-size:11px;color:rgba(255,255,255,.65)}
.cult-fact strong{color:var(--gold-light);display:block;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}

/* TRAIN BANNER */
.train-ban{margin:0 16px 16px;background:var(--dark);color:#fff;padding:12px 14px;border-radius:var(--r);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.train-ban__lbl{font-weight:600;font-size:12px}
.train-ban__info{font-size:11px;color:rgba(255,255,255,.6);flex:1}
.train-ban__badge{font-size:10px;background:rgba(212,112,90,.3);padding:4px 10px;border-radius:var(--r-pill);color:var(--gold-light);white-space:nowrap}

/* TIMELINE */
.timeline{padding:0 16px 24px}
.tl-item{display:grid;grid-template-columns:50px 1fr;gap:0 14px}
.tl-time{text-align:right;padding-top:20px}
.tl-time span{font-size:11px;font-weight:600;color:var(--brick)}
.tl-body{position:relative;padding:0 0 0 16px;border-left:2px solid var(--cream-dark)}
.tl-dot{position:absolute;left:-6px;top:22px;width:10px;height:10px;border-radius:50%;background:var(--brick);border:2px solid var(--cream)}
.tl-dot.gold{background:var(--gold)}
.tl-dot.stone{background:var(--stone)}
.tl-dot.transport{background:var(--transport)}
/* TIMELINE CARDS — modernisées avec feedback tactile */
.tl-card{
  background:var(--surface-alt);
  border-radius:var(--r-lg);
  padding:16px 14px;
  margin:10px 0;
  box-shadow:var(--shadow);
  border-left:3px solid var(--cream-dark);
  transition:box-shadow .2s ease, transform .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.tl-card:active{transform:scale(.99);box-shadow:var(--shadow-xs)}
.tl-card.highlight{border-left-color:var(--brick)}

/* ── États temporels des steps (contextuels au jour courant) ─────
   L'indicateur "où en suis-je" est LA promesse n°1 d'un guide de
   voyage. Ces classes ne s'appliquent QUE si le jour affiché est
   celui d'aujourd'hui (calculé par renderDayPanel).                */

/* Past : étape terminée → estompée, mais lisible */
.tl-item--past .tl-card{
  opacity:.55;
  filter:saturate(.7);
}
.tl-item--past .tl-time span{opacity:.5}
.tl-item--past .tl-dot{background:var(--text-muted) !important;opacity:.5}

/* Now : étape en cours → highlight chaleureux + halo discret */
.tl-item--now .tl-card{
  border-left-color:var(--brick);
  border-left-width:4px;
  box-shadow:
    0 0 0 1px var(--brick),
    0 4px 20px rgba(212,112,90,.25),
    var(--shadow-md);
  background:linear-gradient(
    to right,
    color-mix(in srgb, var(--brick) 6%, var(--surface-alt)) 0%,
    var(--surface-alt) 40%
  );
}
@supports not (background: color-mix(in srgb, red, blue)) {
  .tl-item--now .tl-card{background:var(--peche)}
}
.tl-item--now .tl-time span{
  color:var(--brick);
  font-weight:700;
  font-size:13px;
}
.tl-item--now .tl-dot{
  background:var(--brick) !important;
  width:14px;height:14px;
  left:-8px;
  box-shadow:0 0 0 4px color-mix(in srgb, var(--brick) 25%, transparent);
  animation:pulse-now 2s ease-in-out infinite;
}
@supports not (background: color-mix(in srgb, red, blue)) {
  .tl-item--now .tl-dot{box-shadow:0 0 0 4px rgba(212,112,90,.25)}
}
@keyframes pulse-now{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.15);opacity:.85}
}

/* Next : prochaine étape à venir (s'il n'y a pas de "now" actif) */
.tl-item--next .tl-card{
  border-left-color:var(--gold);
  border-left-width:3px;
}
.tl-item--next .tl-time span{color:var(--gold);font-weight:700}
.tl-item--next .tl-dot{
  background:var(--gold) !important;
  box-shadow:0 0 0 3px color-mix(in srgb, var(--gold) 20%, transparent);
}

/* Badges now/next — typographie distincte pour signal fort */
.step-badge--now{
  background:var(--brick);
  color:#fff;
  font-weight:700;
  letter-spacing:.5px;
  animation:badge-pulse 2s ease-in-out infinite;
}
.step-badge--next{
  background:color-mix(in srgb, var(--gold) 18%, var(--surface-alt));
  color:var(--gold);
  border:1px solid color-mix(in srgb, var(--gold) 30%, transparent);
  font-weight:600;
}
@supports not (background: color-mix(in srgb, red, blue)) {
  .step-badge--next{background:rgba(212,168,83,.14);border:1px solid rgba(212,168,83,.3)}
}
@keyframes badge-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(212,112,90,.5)}
  50%{box-shadow:0 0 0 6px rgba(212,112,90,0)}
}
.tl-card.food{border-left-color:var(--gold)}
.tl-card.culture{border-left-color:var(--stone)}
.tl-card.transport{border-left-color:var(--transport)}
.c-type{font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:3px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
/* Icône SVG dans le label de type — hérite de la couleur du parent via currentColor */
.svg-type-ico{display:inline-flex;align-items:center;flex-shrink:0}
.svg-type-ico svg{width:13px;height:13px;display:block}
.c-type.highlight{color:var(--brick)}
.c-type.food{color:var(--gold)}

/* NOTE: .story-btn/.story-drw/.c-alt conserves pour retrocompatibilite

.story-btn{background:none;border:1px solid rgba(196,82,42,.22);color:var(--brick);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;margin-top:9px;transition:all .2s;font-family:var(--f-body);min-height:44px}

.c-alt-hdr{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
.link-p{color:inherit;text-decoration:none;border-bottom:1px dashed rgba(196,82,42,.3);transition:border-color .2s}
.link-p:hover{border-color:var(--brick)}

/* FREE DAY */
.free-day{margin:14px 16px 28px;background:var(--surface-alt);border-radius:var(--r);padding:22px 18px;box-shadow:var(--shadow);text-align:center}
.free-day__orn{font-family:var(--f-italic);font-size:34px;color:var(--gold);margin-bottom:10px}

.badges{display:flex;justify-content:center;flex-wrap:wrap;gap:7px;margin-top:11px}
.badge{background:var(--surface-alt);border-radius:var(--r-pill);padding:5px 12px;font-size:10px;color:var(--bordeaux);font-weight:500;box-shadow:0 2px 8px rgba(61,31,26,.08)}
.restos-intro{padding:13px 20px 5px;text-align:center}
.restos-intro p{font-family:var(--f-italic);font-size:14px;font-style:italic;color:var(--bordeaux);line-height:1.75}
.resto-cards{padding:0 14px 20px;display:flex;flex-direction:column;gap:10px}

.stars-row{font-size:11px;color:#D4A020;letter-spacing:1px;margin-bottom:5px}

/* Bouton retour — supprimé en tant que bouton flottant absolu,
   remplacé par une card "retour" dans le carrousel (voir initSwipeMap) */
.map-back-btn{ display:none !important }

/* Card de jour (état overview) */
.place-card--day{cursor:pointer}
.place-card--day .card-thumb{
  border-radius:10px;
  font-family:var(--f-display);
}

/* Card retour — pill compact, pas de hauteur fixe comme les étapes */
.place-card--back{
  width:auto;
  min-width:auto;
  height:44px;
  padding:0 16px;
  background:var(--cream);
  border:1.5px solid var(--cream-dark);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  gap:6px;
  flex-shrink:0;
  align-self:center;  /* centré verticalement dans le track */
}
.place-card--back svg{width:16px;height:16px;color:var(--text);flex-shrink:0}
.place-card--back span{
  font-family:var(--f-body);
  font-size:11px;font-weight:600;color:var(--text);
  white-space:nowrap;
  line-height:1.2;
}

/* Tooltip Leaflet custom */
.lf-tooltip{
  background:var(--surface-alt);border:none;
  border-radius:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  padding:5px 10px;
  font-family:var(--f-body);font-size:11px;font-weight:600;color:var(--text);
  white-space:nowrap;
}
.lf-tooltip::before{display:none}

/* Forcer les marqueurs Leaflet sous l'overlay des cards.
   On abaisse les panes ET on monte l'overlay pour garantir
   que les pins ne passent jamais par-dessus les cards.      */
.leaflet-marker-pane { z-index: 4 !important }
.leaflet-tooltip-pane{ z-index: 5 !important }
.leaflet-popup-pane  { z-index: 5 !important }

/* Wrapper — occupe tout l'espace disponible sous le header Cartes.

   Fix mobile : on utilise svh (small viewport) plutôt que dvh pour avoir
   une hauteur STABLE qui ne bouge pas quand la barre d'URL iOS/Android
   apparaît/disparaît. dvh recalcule en live → Leaflet perd ses tuiles.
   svh = plus petite hauteur possible, donc jamais de reflow inattendu.  */
.map-swipe-wrapper{
  position:relative;
  width:100%;
  height:calc(100svh - var(--pb) - 108px);
  /* Fallback pour vieux navigateurs sans svh (Safari < 15.4) */
  height:calc(100vh - var(--pb) - 108px);
  height:calc(100svh - var(--pb) - 108px);
  min-height:360px;
  overflow:hidden;
  margin-top:0;
  /* Isolation : crée un nouveau stacking context + limite le repaint
     au sous-arbre de la carte (perf + pas de fuite de z-index)       */
  isolation:isolate;
  contain:layout paint;
}

/* La carte Leaflet en fond absolu */
#lf-swipe-map{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  /* Fallback couleur pendant le chargement des tuiles → jamais de blanc cassé */
  background:#f2ede4;
  /* Force le GPU pour le rendu des tuiles (fix flicker Android) */
  transform:translateZ(0);
  will-change:transform;
}
/* Masquer les tuiles tant que Leaflet n'a pas fait son premier render valide,
   pour éviter le flash d'une seconde qu'on voit actuellement */
#lf-swipe-map:not(.lf-ready) .leaflet-tile-container{opacity:0}
#lf-swipe-map.lf-ready .leaflet-tile-container{
  opacity:1;
  transition:opacity .28s ease;
}

/* Loader élégant pendant le chargement initial — remplace le vide crème */
#lf-swipe-map:not(.lf-ready)::after{
  content:'';
  position:absolute;
  top:50%;left:50%;
  width:32px;height:32px;
  margin:-16px 0 0 -16px;
  border:2.5px solid rgba(61,43,31,.12);
  border-top-color:var(--brick, #C4522A);
  border-radius:50%;
  animation:lf-spin .9s linear infinite;
  z-index:1;
  pointer-events:none;
}
#lf-swipe-map.lf-ready::after{display:none}
@keyframes lf-spin{to{transform:rotate(360deg)}}

/* Zone overlay des cards — z-index élevé pour passer au-dessus
   des panes Leaflet (marqueurs à z-index 4, overlay à 20)     */
.cards-overlay{
  position:absolute;
  bottom:0;left:0;right:0;
  padding-bottom:16px;
  pointer-events:none;
  z-index:20;
  /* Gradient de masquage — efface proprement les marqueurs qui
     déborderaient dans la zone des cards                       */
  background:linear-gradient(to bottom,
    transparent 0%,
    transparent 40%,
    rgba(253,245,240,.85) 70%,
    rgba(253,245,240,.95) 100%
  );
}

/* Track scrollable horizontal avec scroll-snap */
.cards-track{
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px 40px 4px;
  overflow-x:auto;
  overflow-y:visible;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  pointer-events:all;
  scrollbar-width:none;
}
.cards-track::-webkit-scrollbar{display:none}

/* Card individuelle */
.place-card{
  flex-shrink:0;
  width:calc(100vw - 80px);
  max-width:500px;
  min-height:88px;
  background:var(--surface-alt);
  border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.18);
  scroll-snap-align:center;
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  cursor:pointer;
  pointer-events:all;
  /* Transition plus riche + tap feedback */
  transition:box-shadow .22s ease, transform .18s ease;
  text-decoration:none;
  color:inherit;
  /* Désactiver le highlight bleu Android au tap */
  -webkit-tap-highlight-color:transparent;
}
.place-card:active{
  transform:scale(.97);
  box-shadow:0 2px 10px rgba(0,0,0,.14);
}
.place-card.active{
  box-shadow:0 6px 28px rgba(0,0,0,.24);
  transform:translateY(-2px);
}

/* Thumbnail 72×72 */
.card-thumb{
  width:72px;height:72px;
  border-radius:10px;
  object-fit:cover;
  flex-shrink:0;
  background:var(--cream-dark);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}

/* Zone texte */
.card-body{
  display:flex;align-items:center;gap:8px;
  flex:1;min-width:0;
}
.card-emoji{font-size:18px;flex-shrink:0;line-height:1}
.card-text{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.card-name{
  font-size:15px;font-weight:600;color:#1a1a1a;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.card-meta{
  font-size:12px;color:#666;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}

/* Bouton lien externe ↗ */

  flex-shrink:0;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  color:#555;text-decoration:none;

.card-link:hover{background:#f0f0f0}

/* ── Pins teardrop — spec exacte de la doc ────────────────────────── */
/* Forme : cercle avec pointe vers le bas via border-radius + rotate(-45deg) */
.map-pin{

  transform:rotate(-45deg);

<script>
'use strict';

/* Helpers */
const $  = id => document.getElementById(id);
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

/* safeUrl — valide les URLs avant injection dans href/src
   Accepte : https, http, tel, mailto. Rejette javascript: et autres. */
function safeUrl(url) {
  if (!url) return '#';
  try {
    const u = new URL(url, location.href);
    return ['https:', 'http:', 'tel:', 'mailto:'].includes(u.protocol) ? url : '#';
  } catch { return '#'; }
}

/* ── Système de couleurs des marqueurs ────────────────────────────
   Source de vérité unique : ces couleurs sont utilisées à la fois
   pour les marqueurs Leaflet ET pour les dots de la légende colorée.
   Chaque type a une couleur "full" (stop obligatoire) et "pale"
   (stop optionnel, bord pointillé) — toutes tirées du design system. */
const MAP_COLORS = {
  hotel:      { full:'#9B7BAA', pale:null       },  /* violette                  */
  visite:     { full:'#D4705A', pale:'#F2C4A8'  },  /* brick → brick-pastel      */
  musee:      { full:'#8B7355', pale:'#C4A882'  },  /* stone → stone-light       */
  restaurant: { full:'#D4A853', pale:'#E8C4A8'  },  /* gold → gold-light         */
  cafe:       { full:'#D4A853', pale:'#E8C4A8'  },  /* gold (même que restaurant)*/
  balade:     { full:'#E8956A', pale:'#F4C8A8'  },  /* ocre → ocre-light         */
  transport:  { full:'#6B8E9F', pale:'#A8C4D0'  },  /* transport → light         */
  spectacle:  { full:'#8B7355', pale:'#C4A882'  },  /* stone                     */
  shopping:   { full:'#D4705A', pale:'#F2C4A8'  },  /* brick (≠ visite intentionnel — voir légende) */
};

/* Labels affichés dans la légende — on sépare Visite et Shopping
   même s'ils partagent la même couleur brick, car leur sémantique
   est différente (voir → acheter). La couleur commune crée du lien
   sans effacer la distinction de sens.                              */
const TYPE_LABELS = {
  hotel:      'Hôtel',
  visite:     'Visite',
  musee:      'Musée',
  restaurant: 'Restaurant',
  cafe:       'Café',
  balade:     'Balade',
  transport:  'Transport',
  spectacle:  'Spectacle',
  shopping:   'Shopping',
};

/* ── Initialisation de toutes les cartes Leaflet ──────────────────
   Cette fonction est appelée une fois après que tout le HTML a été
   injecté par les renderers. Elle lit window._pendingMaps, un tableau
   rempli par renderMapBlock() via des <script> inline, et initialise
   chaque carte Leaflet dans le bon div.

   Architecture : on utilise une queue (_pendingMaps) plutôt que
   d'initialiser dans renderMapBlock() directement, parce que Leaflet
   a besoin que le div soit dans le DOM avant d'appeler L.map().
   Les <script> inline sont exécutés au moment du innerHTML, donc
   avant que le navigateur ait rendu les divs — d'où la queue.      */
function initAllMaps() {
  if (typeof L === 'undefined') return; /* Leaflet non chargé — bail silencieux */

  /* Tuiles CartoDB Voyager — choisies pour leur accord avec la palette
     chaude brick/ocre de l'app. Pas de clé API requise.              */
  const TILE_URL  = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
  const TILE_ATTR = '© <a href="https://openstreetmap.org">OpenStreetMap</a> · © <a href="https://carto.com">CartoDB</a>';

  /* Registre global des instances Leaflet — clé: mapId, valeur: instance L.map
     Utilisé par showDay() pour appeler invalidateSize() quand un panneau
     devient visible (Leaflet calcule mal les dimensions sur display:none). */
  window._leafletMaps = window._leafletMaps || {};

  (window._pendingMaps || []).forEach(cfg => {
    const el = document.getElementById(cfg.id);
    if (!el || el._leaflet_id) return; /* div absent ou déjà initialisé */

    /* Désactiver le scroll wheel pour éviter les zooms accidentels
       quand l'utilisateur fait défiler la page sur mobile.          */
    const map = L.map(el, {
      center: cfg.center,
      zoom:   cfg.zoom,
      scrollWheelZoom: false,
      zoomControl: true,
      attributionControl: true,
    });

    /* Stocker l'instance pour pouvoir appeler invalidateSize() plus tard */
    window._leafletMaps[cfg.id] = map;

    /* Couche de tuiles CartoDB Voyager */
    const tileLayer = L.tileLayer(TILE_URL, {
      attribution: TILE_ATTR,
      maxZoom: 19,
      subdomains: 'abcd',
      keepBuffer: 2,
    }).addTo(map);

    /* Révéler la carte en fade quand les tuiles sont prêtes (évite le flash).
       Classe lf-ready posée sur le container parent (.leaflet-map).         */
    tileLayer.once('load', () => el.classList.add('lf-ready'));
    /* Sécurité réseau : révélation forcée après 1.5s si l'event tarde */
    setTimeout(() => el.classList.add('lf-ready'), 1500);

    /* Polyligne de trajet — relie les steps dans l'ordre chronologique.
       Couleur brick à faible opacité pour guider sans concurrencer
       les marqueurs colorés qui portent l'information principale.    */
    if (cfg.steps.length > 1) {
      L.polyline(
        cfg.steps.map(s => [s.lat, s.lng]),
        { color:'#D4705A', weight:2, opacity:0.45, dashArray:'6 9', lineJoin:'round' }
      ).addTo(map);
    }

    /* Marqueurs — L.divIcon permet d'injecter du HTML arbitraire.
       IMPORTANT : bringToFront() n'existe QUE sur L.Path (SVG).
       Les L.Marker sont des éléments DOM — ne pas appeler bringToFront()
       dessus, ça lève une TypeError.                                 */
    cfg.steps.forEach(step => {
      const palette  = MAP_COLORS[step.type] || MAP_COLORS.visite;
      const bgColor  = step.opt && palette.pale ? palette.pale : palette.full;
      const isOpt    = step.opt && palette.pale;
      const isHotel  = step.type === 'hotel';

      /* Couleur du texte : blanc sur fond sombre, semi-opaque sur fond pâle */
      const textColor   = isOpt ? 'rgba(61,31,26,0.65)' : '#ffffff';
      const borderStyle = isOpt ? 'dashed' : 'solid';
      const borderColor = isOpt ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.9)';
      const shadow      = isOpt ? '0 1px 4px rgba(0,0,0,.12)' : '0 2px 8px rgba(0,0,0,.28)';
      const fontSize    = isHotel ? '10px' : '11px';

      const icon = L.divIcon({
        className: '',  /* vider la classe défaut qui ajoute un fond blanc parasite */
        html: `<div style="
          width:28px;height:28px;border-radius:50%;
          background:${bgColor};
          border:2.5px ${borderStyle} ${borderColor};
          box-shadow:${shadow};
          display:flex;align-items:center;justify-content:center;
          font-family:'Playfair Display',Georgia,serif;
          font-size:${fontSize};font-weight:700;
          color:${textColor};
        ">${esc(step.num)}</div>`,
        iconSize:    [28, 28],
        iconAnchor:  [14, 14],   /* ancre au centre du cercle */
        popupAnchor: [0, -18],   /* popup s'ouvre juste au-dessus */
      });

      /* Popup — le badge reprend la couleur pleine même pour les optionnels,
         pour assurer le contraste sur fond blanc.
         Toutes les valeurs de step sont échappées via esc() : même si ces
         données viennent d'un TRIP constant local, on évite la faille XSS
         systémique qui exploserait le jour où on ajouterait une adresse
         contenant des caractères HTML (guillemet, apostrophe, chevron). */
      const optLabel = step.opt ? ' · optionnel' : '';
      const popup = `<div class="lf-popup">
        <span class="lf-popup__badge" style="background:${palette.full}">${esc(step.time)}${esc(optLabel)}</span>
        <div class="lf-popup__type">${esc(step.type)}</div>
        <div class="lf-popup__name">${esc(step.name)}</div>
      </div>`;

      L.marker([step.lat, step.lng], { icon })
        .addTo(map)
        .bindPopup(popup, { maxWidth:220, closeButton:false });
    });
  });

  /* Vider la queue après initialisation */
  window._pendingMaps = [];
}

/* ── Navigation principale ─────────────────────────────────────── */
function initNav() {
  document.querySelectorAll('.app-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.app-nav-btn').forEach(b => b.classList.remove('active'));
      $(btn.dataset.section).classList.add('active');
      btn.classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});

      /* ── Initialisation / réveil de la carte swipe ─────────────────
         La section doit être peinte (display:block, dimensions réelles)
         AVANT que Leaflet lise les dimensions du container. On utilise
         un double rAF + un petit setTimeout pour garantir que :
         1) le navigateur a appliqué le display:block
         2) le navigateur a effectué un layout complet
         3) la barre d'URL mobile ne bouge plus

         Si la carte existe déjà : on se contente d'un invalidateSize()
         (le bug classique "Leaflet caché → tuiles en 0×0").           */
      if (btn.dataset.section === 'section-cartes') {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const mapEl = document.getElementById('lf-swipe-map');
          if (!mapEl) return;

          if (!mapEl._swipeMapInit) {
            /* Premier affichage : on initialise après un court délai pour
               s'assurer que dimensions sont stables (mobile URL bar).   */
            setTimeout(initSwipeMap, 50);
          } else if (mapEl._swipeMapInst) {
            /* Ré-affichage : forcer recalcul des tuiles */
            mapEl._swipeMapInst.invalidateSize(true);
          }
        }));
      }
    });
  });
}

/* ── Navigation jours ──────────────────────────────────────────── */
function showDay(id) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-selected','false');
  });
  const panel = $(id);
  if (panel) panel.classList.add('active');
  const chip = document.querySelector(`.chip[data-day="${id}"]`);
  if (chip) {
    chip.classList.add('active');
    chip.setAttribute('aria-selected','true');
    chip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
  window.scrollTo({top:0,behavior:'smooth'});

  /* Corriger le bug Leaflet "tuiles invisibles" :
     Leaflet calcule les dimensions au moment de L.map() mais le panneau
     est alors display:none — les dimensions sont 0×0.
     Double rAF : garantit que le navigateur a terminé le layout après
     l'ajout de .active (passage display:none → display:block).
     invalidateSize(true) avec pan=true force Leaflet à recharger les
     tuiles même si le centre n'a pas changé. Indispensable sinon on
     conserve les vieilles tuiles désynchronisées.                    */
  if (panel && window._leafletMaps) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      panel.querySelectorAll('.leaflet-map').forEach(el => {
        const mapInst = window._leafletMaps[el.id];
        if (mapInst) mapInst.invalidateSize(true);
      });
    }));
  }
}

/* toggleStory — listener délégué (remplace l'ancien onclick inline) */
function initStoryListeners(root) {
  root.addEventListener('click', e => {
    const btn = e.target.closest('[data-action="toggle-story"]');
    if (!btn) return;
    const drw = btn.nextElementSibling;
    if (!drw) return;
    /* Sauvegarder le label original AVANT de modifier textContent */
    if (!btn.dataset.label) btn.dataset.label = btn.textContent.trim();
    const open = drw.classList.toggle('open');
    btn.textContent = open ? '− Fermer' : btn.dataset.label;
  });
}

const TYPE_MAP = {
  visite:    { css: 'highlight', ico: ICO.visite    },
  musee:     { css: 'culture',   ico: ICO.musee     },
  restaurant:{ css: 'food',      ico: ICO.restaurant},
  cafe:      { css: 'food',      ico: ICO.cafe      },
  balade:    { css: 'highlight', ico: ICO.balade    },
  transport: { css: 'transport', ico: ICO.transport },
  spectacle: { css: 'culture',   ico: ICO.spectacle },
  shopping:  { css: 'food',      ico: ICO.shopping  },
};
function stepMeta(s) {
  const p = s.practical || {};
  const parts = [];
  if (p.price)   parts.push(p.price);
  if (p.opening) parts.push(p.opening);
  if (p.address) parts.push(p.address);
  if (s.duration_min) {
    const h = Math.floor(s.duration_min / 60);
    const m = s.duration_min % 60;
    parts.push('~' + (h > 0 ? h + 'h' : '') + (m > 0 ? (h > 0 ? (String(m).padStart(2,'0')) : m + 'min') : ''));
  }
  return parts;
}

/* Parser de time tolérant — "10:00", "10h00", "10h", "Base" → minutes depuis minuit
   Retourne null si illisible (step sans time réel, ex: hôtel en "Base").          */
function stepTimeMinutes(t) {
  if (!t || typeof t !== 'string') return null;
  const m = t.match(/(\d{1,2})\s*[:hH.]?\s*(\d{2})?/);
  if (!m) return null;
  const h = parseInt(m[1], 10);
  const mm = m[2] ? parseInt(m[2], 10) : 0;
  if (isNaN(h) || isNaN(mm) || h > 23) return null;
  return h * 60 + mm;
}

/* Classifier une étape par rapport à l'heure courante : 'past' / 'now' / 'next' / 'upcoming'.
   context = { isToday, nowMinutes, nextUpcomingIdx } — construit par renderDayPanel. */
function classifyStep(s, idx, ctx) {
  if (!ctx.isToday) return null;
  const tStart = stepTimeMinutes(s.time);
  if (tStart == null) return null;
  const tEnd = tStart + (s.duration_min || 30);
  if (ctx.nowMinutes >= tStart && ctx.nowMinutes < tEnd) return 'now';
  if (ctx.nowMinutes >= tEnd) return 'past';
  if (idx === ctx.nextUpcomingIdx) return 'next';
  return 'upcoming';
}

function renderStep(s, idx, ctx) {
  const t    = TYPE_MAP[s.type] || { css: 'highlight', ico: ICO.visite };
  const p    = s.practical || {};
  const mapsUrl = p.maps_url || null;

  /* État temporel (null si ce n'est pas le jour courant) */
  const temporal = ctx ? classifyStep(s, idx, ctx) : null;
  const temporalClass = temporal ? ` tl-item--${temporal}` : '';
  const nowBadge = temporal === 'now'
    ? `<span class="step-badge step-badge--now">● En ce moment</span>`
    : '';
  const nextBadge = temporal === 'next'
    ? `<span class="step-badge step-badge--next">↑ Prochaine étape</span>`
    : '';

  const titleHtml = mapsUrl
    ? `<a href="${safeUrl(mapsUrl)}" target="_blank" rel="noopener noreferrer" class="link-p">${esc(s.name)} 📍</a>`
    : esc(s.name);

  const metaItems = stepMeta(s).map(m=>`<span>${esc(m)}</span>`).join('');

  /* Badges: now / next / optional / reservation (ordre d'importance) */
  const badges = [
    nowBadge,
    nextBadge,
    s.is_optional         ? `<span class="step-badge step-badge--opt">Optionnel</span>` : '',
    s.reservation_required? `<span class="step-badge step-badge--resa">⚠ Reserver</span>` : '',
  ].join('');

  /* Booking button */
  const bookingHtml = p.booking_url ? `
    <a class="step-book-btn" href="${safeUrl(p.booking_url)}" target="_blank" rel="noopener noreferrer">Reserver →</a>` : '';

  /* Phone */
  const phoneHtml = p.phone ? `
    <a class="step-phone" href="${safeUrl('tel:' + p.phone)}">📞 ${esc(p.phone)}</a>` : '';

  /* Tip */
  const tipHtml = s.tips ? `
    <div class="step-tip">💡 ${esc(s.tips)}</div>` : '';

  /* Story drawer */
  const storyHtml = s.story ? `
    <button class="story-btn" data-action="toggle-story">${esc(s.storyLabel || '+ Histoire du lieu')}</button>
    <div class="story-drw">${esc(s.story)}</div>` : '';

  /* Time display: "09:00" → "9h00" */
  const timeDisplay = s.time ? s.time.replace(':','h').replace(/^0/,'') : '';

  /* Ancre id pour permettre un scroll programmatique vers l'étape "now" */
  const anchorId = temporal === 'now' ? ` id="step-now"` : '';

  return `<div class="tl-item${temporalClass}"${anchorId}>
    <div class="tl-time"><span>${esc(timeDisplay)}</span></div>
    <div class="tl-body">
      <div class="tl-dot ${t.css}"></div>
      <div class="tl-card ${t.css}${s.is_optional ? ' tl-card--optional' : ''}">
        <div class="c-type ${t.css}"><span class="svg-type-ico">${t.ico}</span>${esc(s.type)}</div>
        <div class="c-title">${titleHtml}</div>
        ${badges}
        <div class="c-desc">${esc(s.description)}</div>
        <div class="c-meta">${metaItems}</div>
        ${phoneHtml}${bookingHtml}${tipHtml}${storyHtml}
      </div>
    </div>
  </div>`;
}

function renderDayPanel(day) {
  const trainHtml = day.trainBanner ? `<div class="train-ban">
    <div>🚆 <span class="train-ban__lbl">${esc(day.trainBanner.label || '')}</span></div>
    <div class="train-ban__info">${esc(day.trainBanner.info || '')}</div>
    <div class="train-ban__badge">${esc(day.trainBanner.badge || '')}</div>
  </div>` : '';

  /* ── Contexte temporel ─────────────────────────────────────────
     Si ce jour-ci est celui d'aujourd'hui, on calcule pour chaque step
     son état (past / now / next / upcoming) et on surligne la "now".
     Le badge "prochaine étape" va sur le premier step à venir si
     aucun step n'est actuellement en cours.                        */
  const steps = day.steps || day.events || [];
  const [sy, sm, sd] = TRIP.meta.tripStart.split('-').map(Number);
  const tripStart = new Date(sy, sm - 1, sd);
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayOffset = Math.round((todayMidnight - tripStart) / 86400000);
  const isToday = (day.id === (TRIP.days[dayOffset] || {}).id);
  const nowMinutes = now.getHours() * 60 + now.getMinutes();

  /* Trouver l'index du prochain step à venir (premier dont tStart > now,
     utilisé uniquement s'il n'y a aucun step "now" en cours).          */
  let nextUpcomingIdx = -1;
  if (isToday) {
    for (let i = 0; i < steps.length; i++) {
      const tStart = stepTimeMinutes(steps[i].time);
      if (tStart != null && tStart > nowMinutes) { nextUpcomingIdx = i; break; }
    }
  }

  const ctx = { isToday, nowMinutes, nextUpcomingIdx };

  const contentHtml = day.freeDay
    ? `<div class="free-day">
        <div class="free-day__orn">✦</div>
        <div class="free-day__ttl">Ce jour vous appartient</div>
        <div class="free-day__txt">${esc(day.freeDayMessage || '')}</div>
       </div>`
    : `<div class="timeline">${steps.map((s, i) => renderStep(s, i, ctx)).join('')}</div>`;

  return `<div id="${esc(day.id)}" class="day-panel">
    <div class="day-hdr">
      <div class="day-bgnum">${esc(day.bgNum || '')}</div>
      <div class="day-lbl">${esc(day.label || '')}</div>
      <div class="day-ttl">${esc(day.title || '')}</div>

function renderRestoCard(r, i) {
  /* Meta grid — depuis r.meta[] si present, sinon construit depuis les champs */
  const metaItems = r.meta || [
    r.address      ? { label: 'Adresse',     value: r.address } : null,
    r.price_range  ? { label: 'Prix',        value: r.price_range } : null,
    r.opening      ? { label: 'Ouvert',      value: r.opening } : null,
    r.reservation_required != null
      ? { label: 'Reservation', value: r.reservation_required ? 'Obligatoire ⚠' : 'Libre' }
      : null,
  ].filter(Boolean);

  const metaHtml  = metaItems.map(m=>`<div class="mi"><span class="mi__lbl">${esc(m.label)}</span><span class="mi__val">${esc(m.value)}</span></div>`).join('');
  const tagsHtml  = (r.tags||[]).map(t=>`<span class="tag" style="background:${t.bg};color:${t.color}">${esc(t.text)}</span>`).join('');

  /* Stars */
  const starsHtml = r.stars ? `
    <div class="stars-row">${esc(r.stars)} <span>${esc(r.starsNote||'')}</span></div>` : '';

  /* Days badge */
  const daysBadge = (r.used_on_days||[]).length
    ? `<div class="rc__days">${r.used_on_days.map(d=>`<span>${esc(d.replace('day','J'))}</span>`).join('')}</div>`
    : '';

  /* Actions */
  const actions = [];
  if (r.maps_url)    actions.push(`<a class="btn-m" href="${safeUrl(r.maps_url)}" target="_blank" rel="noopener noreferrer">📍 Google Maps</a>`);
  if (r.phone)       actions.push(`<a class="btn-m btn-m--blue" href="${safeUrl('tel:' + r.phone)}">📞 ${esc(r.phone)}</a>`);
  if (r.booking_url) actions.push(`<a class="btn-r" href="${safeUrl(r.booking_url)}" target="_blank" rel="noopener noreferrer">🍴 Reserver sur TheFork</a>`);

  /* Verdict label */
  const verdictLabel = r.verdictLabel || 'Notre verdict';

  /* Thumbnail — photo du lieu si disponible, sinon bloc coloré accentColor.
     Emoji choisi selon la catégorie. Fallback sur 🍽 si category manquante
     ou non-reconnue, pour ne jamais crasher la page Restos.              */
  const cat = r.category || '';
  const thumbEmoji =
    cat.includes('Jordan')   ? '⭐' :
    cat.includes('Michelin') ? '🌟' :
    cat.includes('Gault')    ? '🏅' :
    cat.includes('Halle')    ? '🏛' : '🍽';

  const thumbHtml = r.photo
    ? `<div class="rc__thumb">
        <img src="${r.photo}" alt="${esc(r.name)}" loading="lazy"
             onerror="this.parentElement.style.display='none'">
      </div>`
    : `<div class="rc__thumb rc__thumb--placeholder" style="background:${r.accentColor||'var(--brick)'}22">
        <span style="font-size:28px">${thumbEmoji}</span>
      </div>`;

  return `<div class="rc" id="${r.id}">
    <div class="rc__acc" style="background:${r.accentColor||'var(--brick)'}"></div>
    ${thumbHtml}
    <div class="rc__body">
      <div class="rc__num">0${i+1}</div>
      <div class="rc__cat" style="color:${r.accentColor||'var(--brick)'}">${esc(r.category||'')}</div>
      <div class="rc__name">${esc(r.name)}</div>
      ${starsHtml}
      ${daysBadge}
      <div class="divider"></div>
      <p class="rc__desc">${esc(r.description)}</p>
      <div class="meta-grid">${metaHtml}</div>
      <div class="tag-row">${tagsHtml}</div>
      <div class="verdict" style="background:${r.verdictBg||'#FFF5F0'};border-left:3px solid ${r.accentColor||'var(--brick)'}">
        <span class="verdict__lbl" style="color:${r.accentColor||'var(--brick)'}">${esc(verdictLabel)}</span>
        ${esc(r.verdict||'')}
      </div>
      <div class="rc-actions">${actions.join('')}</div>
    </div>
  </div>`;
}
