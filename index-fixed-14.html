/* ══════════════════════════════════════════════════════════════════
   CARTE ITINÉRAIRES — spec complète
   ──────────────────────────────────────────────────────────────────
   État 1 OVERVIEW : tous les points de tous les jours, fitBounds global
                     cards = 4 tuiles de jours
   État 2 JOUR X   : flyTo première étape du jour
                     cards = étapes du jour, step 0 active
                     swipe la carte → point à point
   ══════════════════════════════════════════════════════════════════ */
function initSwipeMap() {
  if (typeof L === 'undefined') return;
  const mapEl   = document.getElementById('lf-swipe-map');
  const track   = document.getElementById('cards-track');
  const backBtn = document.getElementById('map-back-btn');
  if (!mapEl || !track) return;
  if (mapEl._swipeMapInit) return;

  /* GARDE-FOU CRITIQUE : ne jamais initialiser Leaflet sur un container
     qui n'a pas encore de dimensions. C'était LA cause du bug "tuiles
     qui flashent 1s puis disparaissent" : L.map() calculait un center
     sur un container 0×0, puis les tuiles étaient chargées pour des
     coordonnées invalides et jamais rafraîchies.                      */
  const rect = mapEl.getBoundingClientRect();
  if (rect.width < 50 || rect.height < 50) {
    /* Retry dans 80ms — le layout n'est pas encore stabilisé */
    setTimeout(initSwipeMap, 80);
    return;
  }

  mapEl._swipeMapInit = true;

  /* ── Tuiles CartoDB Voyager ───────────────────────────────────── */
  const swipeMap = L.map(mapEl, {
    scrollWheelZoom: false,
    zoomControl: false,
    attributionControl: false,
    dragging: true,
    /* Centre + zoom initiaux raisonnables : si fitBounds échoue, on a
       quand même une carte valide centrée sur Toulouse au lieu du vide */
    center: [43.6045, 1.4442],
    zoom: 12,
    /* Performance : ne pas charger les tuiles pendant un pan/zoom animé */
    preferCanvas: false,
  });

  const tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
    /* Buffer de tuiles autour du viewport : pré-charge pour éviter
       les zones blanches pendant le pan.                             */
    keepBuffer: 4,
  }).addTo(swipeMap);

  /* Révéler la carte avec un fade une fois la première tuile chargée.
     Évite le "flash" blanc/crème qu'on voyait à l'ouverture.          */
  tileLayer.once('load', () => {
    mapEl.classList.add('lf-ready');
  });
  /* Sécurité : si pour une raison réseau on n'a jamais l'event load,
     on révèle quand même après 1.5s pour ne pas rester invisible.    */
  setTimeout(() => mapEl.classList.add('lf-ready'), 1500);

  /* Stocker l'instance pour pouvoir appeler invalidateSize() depuis initNav() */
  mapEl._swipeMapInst = swipeMap;

  /* ── État global ─────────────────────────────────────────────── */
  let activeDay   = null;   /* null = overview, sinon index 0-3     */
  let activeStep  = 0;      /* index de l'étape active dans le jour */
  let stepMarkers = [];     /* marqueurs de l'état courant          */
  let observer    = null;   /* IntersectionObserver sur les cards   */
  let _flyLock    = false;  /* verrou anti-reboucle flyTo ↔ swipe   */

  /* ── Couleur par jour (from TRIP.days[].color) ──────────────── */
  /* En overview chaque jour a sa couleur, en mode jour les
     marqueurs reprennent la couleur de type (MAP_COLORS)          */
  const DAY_COLORS = TRIP.days.map(d => d.color || '#D4705A');

  /* ── Construire un marqueur cercle numéroté ──────────────────── */
  function makeMarker(lat, lng, num, color, isActive, isOpt) {
    const bg     = isOpt ? color + '66' : color;
    const border = isActive ? 'rgba(255,255,255,.95)' : 'rgba(255,255,255,.75)';
    const scale  = isActive ? 'scale(1.25)' : 'scale(1)';
    const shadow = isActive ? '0 3px 12px rgba(0,0,0,.35)' : '0 2px 7px rgba(0,0,0,.22)';
    const size   = 30;
    const html = `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${bg};
      border:2.5px solid ${border};
      box-shadow:${shadow};
      display:flex;align-items:center;justify-content:center;
      font-family:'Playfair Display',Georgia,serif;
      font-size:12px;font-weight:700;color:#fff;
      transform:${scale};
      transition:transform .2s ease, box-shadow .2s ease;
      cursor:pointer;
    ">${esc(num)}</div>`;

    return L.marker([lat, lng], {
      icon: L.divIcon({ className:'', html, iconSize:[size,size], iconAnchor:[size/2,size/2] }),
    });
  }

  /* ── Nettoyer tous les marqueurs actuels ─────────────────────── */
  function clearMarkers() {
    stepMarkers.forEach(m => swipeMap.removeLayer(m));
    stepMarkers = [];
  }

  /* ── ÉTAT 1 : Overview — tous les points de tous les jours ───── */
  function showOverview() {
    clearMarkers();
    if (observer) { observer.disconnect(); observer = null; }
    activeDay = null;

    /* Masquer le bouton retour */
    if (backBtn) backBtn.style.display = 'none';

    /* Créer les cards de jours */
    track.innerHTML = '';
    TRIP.days.forEach((day, di) => {
      const color = DAY_COLORS[di];
      const card  = document.createElement('div');
      card.className = 'place-card place-card--day';
      card.dataset.day = String(di);
      card.innerHTML = `
        <div class="card-thumb" style="
          background:${color};
          display:flex;align-items:center;justify-content:center;
          font-family:'Playfair Display',Georgia,serif;
          font-size:22px;font-weight:700;color:rgba(255,255,255,.9);
        ">${String(di+1).padStart(2,'0')}</div>
        <div class="card-body">
          <div class="card-text">
            <span class="card-name" style="color:${color}">${esc(day.chipLabel)} — ${esc(day.title)}</span>
            <span class="card-meta">${esc(day.label)}</span>
          </div>
          <svg style="width:18px;height:18px;flex-shrink:0;color:#aaa" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>`;
      card.addEventListener('click', () => showDay(di));
      track.appendChild(card);
    });

    /* Poser tous les points de tous les jours */
    const allPoints = [];
    TRIP.days.forEach((day, di) => {
      const color = DAY_COLORS[di];
      (day.mapSteps || []).forEach(step => {
        const m = makeMarker(step.lat, step.lng, step.num, color, false, step.opt);
        m.on('click', () => showDay(di));
        m.bindTooltip(esc(step.name), { direction:'top', offset:[0,-16], className:'lf-tooltip' });
        m.addTo(swipeMap);
        stepMarkers.push(m);
        allPoints.push([step.lat, step.lng]);
      });
    });

    /* fitBounds sur tous les points avec padding.
       invalidateSize() juste avant est ESSENTIEL : même si le container
       a été recalculé, Leaflet peut avoir un state interne de size obsolète.
       Sans ça, fitBounds choisit un zoom basé sur une taille fausse et
       les tuiles chargées ne correspondent jamais à la vue finale.      */
    if (allPoints.length > 0) {
      swipeMap.invalidateSize(false);
      swipeMap.fitBounds(allPoints, { padding: [40, 40], maxZoom: 14, animate: false });
    }
  }

  /* ── ÉTAT 2 : Jour sélectionné ───────────────────────────────── */
  function showDay(dayIndex) {
    clearMarkers();
    if (observer) { observer.disconnect(); observer = null; }
    activeDay  = dayIndex;
    activeStep = 0;

    const day   = TRIP.days[dayIndex];
    const steps = day.mapSteps || [];
    if (steps.length === 0) return;

    /* Créer les cards d'étapes */
    track.innerHTML = '';
    const cardEls = [];

    /* ── Card "← Retour" en première position ─────────────────────
       Au même niveau que les cards d'étapes, dans le même carrousel.
       Visuellement cohérente avec les autres cards, sans flotter
       sur la carte ni casser la hiérarchie.                        */
    const backCard = document.createElement('div');
    backCard.className = 'place-card place-card--back';
    backCard.setAttribute('aria-label', 'Retour à la vue d\'ensemble');
    backCard.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span>Tous les jours</span>`;
    backCard.addEventListener('click', showOverview);
    track.appendChild(backCard);

    steps.forEach((step, si) => {
      const palette = MAP_COLORS[step.type] || MAP_COLORS.visite;
      const color   = step.opt ? palette.pale : palette.full;
      const label   = TYPE_LABELS[step.type] || step.type;

      const card = document.createElement('div');
      card.className = 'place-card';
      card.dataset.index = String(si);
      if (si === 0) card.classList.add('active');

      /* Thumbnail : photo du lieu si disponible, sinon bloc coloré + numéro */
      const thumbContent = step.photo
        ? `<img src="${step.photo}" alt="${esc(step.name)}" loading="lazy"
               style="width:100%;height:100%;object-fit:cover;display:block;border-radius:10px"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;
               font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:${color}">${step.num}</div>`
        : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;
               font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:${color}">${step.num}</div>`;

      card.innerHTML = `
        <div class="card-thumb" style="background:${color}22;overflow:hidden;border-radius:10px">
          ${thumbContent}
        </div>
        <div class="card-body">
          <div class="card-text">
            <span class="card-name">${esc(step.name)}</span>
            <span class="card-meta" style="color:${color}">${esc(step.time)} · ${esc(label)}</span>
          </div>
        </div>`;

      card.addEventListener('click', () => selectStep(si, 'card'));
      track.appendChild(card);
      cardEls.push(card);
    });

    /* ── Créer les marqueurs du jour ─────────────────────────────── */
    /* IMPORTANT : on crée ici les marqueurs initiaux (step 0 actif).
       selectStep les recrée entièrement à chaque changement pour
       mettre à jour l'état actif. clearMarkers() est appelé en début
       de selectStep pour éviter la superposition.                   */
    function buildMarkers(activeIdx) {
      clearMarkers();
      steps.forEach((step, si) => {
        const palette = MAP_COLORS[step.type] || MAP_COLORS.visite;
        const color   = step.opt ? palette.pale : palette.full;
        const m = makeMarker(step.lat, step.lng, step.num, color, si === activeIdx, step.opt);
        m.on('click', () => selectStep(si, 'pin'));
        m.addTo(swipeMap);
        stepMarkers.push(m);
      });
    }

    buildMarkers(0);

    /* flyTo sur la première étape */
    swipeMap.flyTo([steps[0].lat, steps[0].lng], 15, { duration: 0.7 });

    /* ── selectStep — synchronise carte ↔ cards ──────────────────
       source = 'card' | 'pin'
       - depuis card → flyTo + rebuilder les marqueurs
       - depuis pin  → scroller la card + rebuilder les marqueurs  */
    function selectStep(idx, source) {
      /* Reconstruire les marqueurs avec le bon état actif */
      buildMarkers(idx);

      /* Classes CSS des cards */
      cardEls.forEach((el, i) => el.classList.toggle('active', i === idx));

      if (source === 'pin') {
        /* Pin cliqué → scroller la card correspondante */
        const card = cardEls[idx];
        if (card) {
          const target = card.offsetLeft - (track.clientWidth / 2) + (card.offsetWidth / 2);
          track.scrollTo({ left: target, behavior: 'smooth' });
        }
      }

      if (source === 'card') {
        /* Tap card → flyTo + verrou pour éviter le reboucle observer */
        _flyLock = true;
        swipeMap.flyTo([steps[idx].lat, steps[idx].lng], 15, { duration: 0.5 });
        /* Déverrouiller après la fin de l'animation (~600ms) */
        setTimeout(() => { _flyLock = false; }, 650);
      }

      /* source === 'swipe' : scroll initié par l'utilisateur
         → on déplace seulement la carte, sans scroller les cards (déjà en position) */
      if (source === 'swipe') {
        _flyLock = true;
        swipeMap.flyTo([steps[idx].lat, steps[idx].lng], 15, { duration: 0.5 });
        setTimeout(() => { _flyLock = false; }, 650);
      }

      activeStep = idx;
    }

    /* IntersectionObserver — détecter la card centrée au swipe.
       On observe uniquement les cards d'étapes (pas la card retour).
       _flyLock : pendant un flyTo programmatique, on ignore l'observer
       pour éviter la boucle flyTo → scroll card → observer → flyTo.
       threshold à 0.5 (baissé de 0.65) : au swipe rapide l'ancienne
       valeur ratait des cards qui ne s'arrêtaient jamais à >65% de
       visibilité, la carte Leaflet restait figée sur l'étape prédédente. */
    observer = new IntersectionObserver(entries => {
      if (_flyLock) return;
      /* Parmi toutes les cards visibles au-delà du seuil, on choisit
         celle dont le centre est le plus proche du centre de la track.
         Sans ce tri, deux cards à 50%+ de visibilité pourraient
         déclencher selectStep dans le mauvais ordre selon l'ordre de
         livraison des entries.                                        */
      const trackCenter = track.scrollLeft + track.clientWidth / 2;
      let best = null;
      let bestDist = Infinity;
      entries.forEach(entry => {
        if (!entry.isIntersecting || entry.intersectionRatio < 0.5) return;
        const idx = parseInt(entry.target.dataset.index, 10);
        if (isNaN(idx)) return;
        const cardCenter = entry.target.offsetLeft + entry.target.offsetWidth / 2;
        const dist = Math.abs(cardCenter - trackCenter);
        if (dist < bestDist) { bestDist = dist; best = idx; }
      });
      if (best != null && best !== activeStep) selectStep(best, 'swipe');
    }, { root: track, threshold: [0.5, 0.75, 1.0] });
    cardEls.forEach(c => observer.observe(c));

    /* Fallback scrollend : si l'observer rate une card lors d'un swipe
       très rapide (momentum scroll iOS), on rattrape à la fin du scroll
       en calculant nous-mêmes quelle card est centrée. Debounce 120ms
       pour ignorer les micro-mouvements pendant l'animation.            */
    let scrollEndTimer = null;
    const onTrackScroll = () => {
      if (_flyLock) return;
      clearTimeout(scrollEndTimer);
      scrollEndTimer = setTimeout(() => {
        const trackCenter = track.scrollLeft + track.clientWidth / 2;
        let best = -1;
        let bestDist = Infinity;
        cardEls.forEach((el, i) => {
          const cardCenter = el.offsetLeft + el.offsetWidth / 2;
          const dist = Math.abs(cardCenter - trackCenter);
          if (dist < bestDist) { bestDist = dist; best = i; }
        });
        if (best !== -1 && best !== activeStep) selectStep(best, 'swipe');
      }, 120);
    };
    track.addEventListener('scroll', onTrackScroll, { passive: true });

    /* Card "← Retour" aussi en dernière position — pattern bookend :
       disponible au début ET à la fin pour ne jamais forcer
       l'utilisateur à scroller en arrière pour quitter un jour. */
    const backCardEnd = document.createElement('div');
    backCardEnd.className = 'place-card place-card--back';
    backCardEnd.setAttribute('aria-label', 'Retour à la vue d\'ensemble');
    backCardEnd.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span>Tous les jours</span>`;
    backCardEnd.addEventListener('click', showOverview);
    track.appendChild(backCardEnd);

    activeStep = 0;
  }

  /* ── Lancement : overview ────────────────────────────────────── */
  /* À ce stade, on est déjà dans un contexte garanti "container peint
     avec dimensions valides" (garde-fou en début de initSwipeMap + appel
     différé depuis initNav). On peut appeler directement showOverview. */
  swipeMap.invalidateSize(false);
  showOverview();

  /* ── Listeners de résilience ─────────────────────────────────────
     Mobile : quand la barre d'URL apparaît/disparaît, le viewport
     change de hauteur → on force Leaflet à se recalculer, sinon on
     aurait une bande crème en bas ou en haut de la carte.            */
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => swipeMap.invalidateSize(false), 150);
  }, { passive: true });

  /* Retour sur l'onglet après mise en veille : forcer refresh tuiles */
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && mapEl._swipeMapInst) {
      setTimeout(() => swipeMap.invalidateSize(false), 120);
    }
  });
}

/* ── Section PRATIQUE — contextuelle (style SNCF anticipatoire) ── */
function renderPratique() {

  /* ── Calcul du jour actif (timezone-safe) ─────────────────────── */
  const [sy, sm, sd] = TRIP.meta.tripStart.split('-').map(Number);
  const start  = new Date(sy, sm - 1, sd);
  const today  = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diff   = Math.round((todayMidnight - start) / 86400000);
  const dayIdx  = (diff >= 0 && diff < TRIP.days.length) ? diff : 0;
  const day     = TRIP.days[dayIdx];
  const JOURS   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const todayLabel = JOURS[today.getDay()] + ' ' + today.getDate();

  /* ── Alertes contextuelles ─────────────────────────────────────── */
  /* Construites depuis les données TRIP — zéro saisie supplémentaire */
  const alerts = [];

  /* 1. Train : remonte si J3 (trainBanner) aujourd'hui ou dans 1-2 jours */
  const trainDayIdx = TRIP.days.findIndex(d => d.trainBanner);
  if (trainDayIdx !== -1) {
    const delta = trainDayIdx - dayIdx;
    if (delta === 0) {
      const tb = TRIP.days[trainDayIdx].trainBanner;
      alerts.push({
        urgency: 'now',
        icon: '🚆',
        title: 'Aujourd\'hui : ' + esc(tb.label),
        body:  esc(tb.info),
        badge: 'Maintenant',
        btnLabel: 'Réserver sur SNCF',
        btnUrl:   'https://www.oui.sncf',
      });
    } else if (delta === 1) {
      const tb = TRIP.days[trainDayIdx].trainBanner;
      alerts.push({
        urgency: 'soon',
        icon: '🚆',
        title: 'Demain : ' + esc(tb.label),
        body:  esc(tb.info) + ' · Pense à réserver si ce n\'est pas fait.',
        badge: 'Demain',
        btnLabel: 'Réserver sur SNCF',
        btnUrl:   'https://www.oui.sncf',
      });
    } else if (delta === 2) {
      const tb = TRIP.days[trainDayIdx].trainBanner;
      alerts.push({
        urgency: 'upcoming',
        icon: '🚆',
        title: 'Dans 2 jours : excursion Carcassonne',
        body:  esc(tb.info),
        badge: 'Dans 2 jours',
        btnLabel: 'Réserver sur SNCF',
        btnUrl:   'https://www.oui.sncf',
      });
    }
  }

  /* 2. Réservations urgentes : steps reservation_required sur J+1 */
  const tomorrow = TRIP.days[dayIdx + 1];
  if (tomorrow && tomorrow.steps) {
    tomorrow.steps.filter(s => s.reservation_required).forEach(s => {
      const p = s.practical || {};
      alerts.push({
        urgency: 'soon',
        icon: '🍽',
        title: 'Demain : ' + esc(s.name),
        body:  (p.opening ? esc(p.opening) : '') + ' · Complet rapidement.',
        badge: 'Réserver maintenant',
        btnLabel: 'Réserver',
        btnUrl:   p.booking_url || null,
      });
    });
  }

  /* 3. Réservations urgentes sur le jour actif non encore passées.
     parseTime : tolère "10:00", "10h00", "10h", "10.00" et retourne
     un entier en minutes depuis minuit. Retourne 9999 si illisible
     (l'événement ne sera jamais considéré comme "à venir").        */
  const parseTime = t => {
    if (!t || typeof t !== 'string') return 9999;
    const m = t.match(/(\d{1,2})\s*[:hH.]\s*(\d{2})?/);
    if (!m) return 9999;
    const h = parseInt(m[1], 10);
    const mm = m[2] ? parseInt(m[2], 10) : 0;
    if (isNaN(h) || isNaN(mm)) return 9999;
    return h * 60 + mm;
  };

  if (day && day.steps) {
    const nowH = today.getHours() * 60 + today.getMinutes();
    day.steps.filter(s => s.reservation_required).forEach(s => {
      const stepH = parseTime(s.time);
      if (stepH > nowH) {
        const p = s.practical || {};
        alerts.push({
          urgency: 'now',
          icon: '🍽',
          title: 'Ce soir : ' + esc(s.name),
          body:  p.opening ? esc(p.opening) : '',
          badge: 'Ce soir',
          btnLabel: 'Réserver',
          btnUrl:   p.booking_url || null,
        });
      }
    });
  }

  /* ── Render alertes ────────────────────────────────────────────── */
  const URGENCY_STYLE = {
    now:      { border: 'var(--brick)',     bg: 'var(--peche)',  badgeBg: 'var(--brick)',     badgeColor: '#fff' },
    soon:     { border: 'var(--gold)',      bg: 'var(--sable)',  badgeBg: 'var(--gold)',      badgeColor: '#fff' },
    upcoming: { border: 'var(--transport)', bg: 'var(--ciel)',   badgeBg: 'var(--transport)', badgeColor: '#fff' },
  };

  const alertsHtml = alerts.map(a => {
    const s = URGENCY_STYLE[a.urgency] || URGENCY_STYLE.upcoming;
    const btn = a.btnUrl
      ? `<a class="prat-alert__btn" href="${safeUrl(a.btnUrl)}" target="_blank" rel="noopener noreferrer">${esc(a.btnLabel)} →</a>`
      : '';
    return `<div class="prat-alert" style="border-left-color:${s.border};background:${s.bg}">
      <div class="prat-alert__top">
        <span class="prat-alert__ico">${a.icon}</span>
        <span class="prat-alert__badge" style="background:${s.badgeBg};color:${s.badgeColor}">${esc(a.badge)}</span>
      </div>
      <div class="prat-alert__title">${a.title}</div>
      ${a.body ? `<div class="prat-alert__body">${a.body}</div>` : ''}
      ${btn}
    </div>`;
  }).join('');

  /* ── Hotel card ────────────────────────────────────────────────── */
  const hotelHtml = (TRIP.hotel && TRIP.hotel.name) ? `
    <div class="prat-row prat-row--hotel">
      <span class="prat-row__ico">🏨</span>
      <div class="prat-row__body">
        <div class="prat-row__title">${esc(TRIP.hotel.name)}</div>
        <div class="prat-row__sub">
          ${TRIP.hotel.address ? esc(TRIP.hotel.address) + '&nbsp;' : ''}
          ${TRIP.hotel.checkin ? '· Check-in ' + esc(TRIP.hotel.checkin) : ''}
        </div>
      </div>
      <div class="prat-row__actions">
        ${TRIP.hotel.mapsUrl ? `<a class="prat-row__btn" href="${safeUrl(TRIP.hotel.mapsUrl)}" target="_blank" aria-label="Voir l'hôtel sur Google Maps">📍</a>` : ''}
        ${TRIP.hotel.phone   ? `<a class="prat-row__btn" href="${safeUrl('tel:' + TRIP.hotel.phone)}" aria-label="Appeler l'hôtel">📞</a>` : ''}
      </div>
    </div>` : `
    <div class="prat-row prat-row--hotel prat-row--empty">
      <span class="prat-row__ico">🏨</span>
      <div class="prat-row__body">
        <div class="prat-row__title">Hébergement</div>
        <div class="prat-row__sub" style="font-style:italic;color:var(--text-muted)">À confirmer — infos à venir</div>
      </div>
    </div>`;

  /* ── Infos permanentes : 3 niveaux ────────────────────────────── */
  /* Icônes SVG Lucide en --text-muted : neutres, informationnelles,
     ne concurrencent pas les éléments interactifs en --brick         */
  const ALWAYS = [
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><circle cx="8.5" cy="17" r="1.5"/><circle cx="15.5" cy="17" r="1.5"/><path d="m9 21-1-4"/><path d="m15 21 1-4"/></svg>`, text: 'Metro A+B · 1,80€/ticket · Bus · VeloToulouse partout en libre-service' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><path d="m9 20 3-6 3 6"/><path d="m6 8 6 2 6-2"/><line x1="12" y1="10" x2="12" y2="14"/></svg>`, text: 'Centre historique entierement pieton — meilleur mode de decouverte' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.69a16 16 0 0 0 6.29 6.29l.98-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`, text: 'SAMU 15 · Police 17 · Pompiers 18 · Europeen 112' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`, text: 'Budget repas : petit-dej ~15€/j · dej ~50-70€ · diner leger ~25-30€ · max 100€/j pour 2' },
  ];

  /* Niveau 2 : En cas de besoin — icônes SVG Lucide en --text-muted
     Souvenirs : fleur (violette de Toulouse) ≠ sac shopping (step actif) */
  const NEED = [
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><line x1="9" y1="2" x2="9" y2="22"/></svg>`, text: 'Pass Musees Toulouse Metropole ~25€ — acces musees municipaux, rentable des 3 visites — office de tourisme' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`, text: 'Printemps ideal · veste legere le soir · risque d\'averse en avril · creme solaire' },
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`, text: 'SNCF Connect (trains) · VeloToulouse (velos) · Citymapper (transports) · TheFork (restos)' },
    /* Fleur SVG = violette de Toulouse — icône distincte du sac shopping */
    { ico: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 2 Q14 7 12 10"/><path d="M12 2 Q10 7 12 10"/><path d="M22 12 Q17 14 14 12"/><path d="M22 12 Q17 10 14 12"/><path d="M12 22 Q14 17 12 14"/><path d="M12 22 Q10 17 12 14"/><path d="M2 12 Q7 14 10 12"/><path d="M2 12 Q7 10 10 12"/></svg>`, text: 'Souvenirs : Violettes de Toulouse (Maison Florentine, Rue Alsace-Lorraine) · Saucisson & foie gras (Maison Garcia, Rue du Taur) · Vins de Fronton (cave Nicolas Capitole) · Gimblettes & cassoulet en bocal (marché Victor Hugo)' },
  ];

  const alwaysHtml = ALWAYS.map(i =>
    `<div class="prat-line"><span class="prat-line__ico">${i.ico}</span><span>${esc(i.text)}</span></div>`
  ).join('');

  const needHtml = NEED.map(i =>
    `<div class="prat-line prat-line--muted"><span class="prat-line__ico">${i.ico}</span><span>${esc(i.text)}</span></div>`
  ).join('');

  /* ── Liens utiles ──────────────────────────────────────────────── */
  const linksHtml = (TRIP.usefulLinks||[]).map(l=>
    `<a class="useful-link" href="${safeUrl(l.url)}" target="_blank" rel="noopener noreferrer">
       <span>${esc(l.label)}</span><span class="useful-link__arr">↗</span>
     </a>`).join('');

  /* ── Photos album ──────────────────────────────────────────────── */
  const photosHtml = TRIP.meta.googlePhotosUrl ? `
    <div class="photos-ban" style="margin:0 13px 13px"><div class="photos-ban__in">
      <div class="photos-ban__ico">📸</div>
      <div><div class="photos-ban__lbl">Album souvenir</div>
           <div class="photos-ban__sub">Photos &amp; videos du sejour</div></div>
      <a class="photos-ban__btn" href="${safeUrl(TRIP.meta.googlePhotosUrl)}" target="_blank" rel="noopener noreferrer">Ouvrir &rarr;</a>
    </div></div>` : '';

  /* ── Contexte du header ─────────────────────────────────────────
     Construit le sous-titre contextualisé selon où on est dans le
     voyage : avant, pendant (avec numéro de jour), ou après.       */
  const totalDays = TRIP.days.length;
  const isDuringTrip = (diff >= 0 && diff < totalDays);
  const isBeforeTrip = (diff < 0);

  let hdrSub, hdrBadge;
  if (isDuringTrip) {
    hdrSub = day.title;
    hdrBadge = `Jour ${dayIdx + 1} sur ${totalDays}`;
  } else if (isBeforeTrip) {
    const daysUntil = Math.abs(diff);
    hdrSub = 'Départ prévu';
    hdrBadge = daysUntil === 1 ? 'Demain' : `Dans ${daysUntil} jours`;
  } else {
    hdrSub = 'Voyage terminé';
    hdrBadge = '✦ Souvenirs';
  }

  /* ── Assemblage final ──────────────────────────────────────────── */
  $('section-pratique').innerHTML = `
    <div class="prat-hdr">
      <div class="prat-hdr__tag">Aujourd'hui · ${esc(todayLabel)}</div>
      <h1>Infos pratiques</h1>
      <div class="prat-hdr__sub">${esc(hdrSub)}</div>
      <div class="prat-hdr__badges">
        <div class="badge">${esc(hdrBadge)}</div>
      </div>
    </div>

    ${photosHtml}

    ${alertsHtml ? `<div class="prat-alerts">${alertsHtml}</div>` : ''}

    <div class="prat-section">
      ${hotelHtml}
    </div>

    <div class="prat-section">
      <div class="prat-section__ttl">Toujours utile</div>
      ${alwaysHtml}
    </div>

    <div class="prat-section">
      <div class="prat-section__ttl">En cas de besoin</div>
      ${needHtml}
    </div>

    ${linksHtml ? `<div class="prat-section">
      <div class="prat-section__ttl">Liens utiles</div>
      <div style="display:flex;flex-direction:column;gap:7px">${linksHtml}</div>
    </div>` : ''}`;
}

/* ── Auto-select today ─────────────────────────────────────────── */
function autoSelectDay() {
  /* Calcul timezone-safe : compare les dates en heure locale */
  const [sy, sm, sd] = TRIP.meta.tripStart.split('-').map(Number);
  const start = new Date(sy, sm - 1, sd);          /* minuit heure locale */
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff  = Math.round((today - start) / 86400000);
  const isDuringTrip = (diff >= 0 && diff < TRIP.days.length);

  if (isDuringTrip) {
    showDay(TRIP.days[diff].id);
  } else {
    showDay(TRIP.days[0].id);
  }

  /* Si on est pendant le voyage, scroller doucement vers l'étape "now"
     après le rendu + paint. Si pas de step now (avant 1er step ou apres
     dernier), on laisse le scroll en haut.                             */
  if (isDuringTrip) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const nowEl = document.getElementById('step-now');
      if (nowEl) {
        /* Petit délai pour laisser le scroll top de showDay se terminer
           avant notre scroll vers l'étape. Sinon ils se court-circuitent. */
        setTimeout(() => {
          nowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 400);
      }
    }));
  }
}

/* ── Boot ──────────────────────────────────────────────────────── */
function boot() {
  try {
    /* Update meta tags from TRIP data — single source of truth */
    const emoji = TRIP.meta.coverEmoji || '✈';
    document.getElementById('page-title').textContent      = TRIP.meta.title + ' — Notre Voyage ' + emoji;
    document.getElementById('meta-og-title').content       = TRIP.meta.title + ' — Notre Voyage ' + emoji;
    document.getElementById('meta-description').content    = TRIP.meta.subtitle + ' · ' + TRIP.days.length + ' jours';
    document.getElementById('meta-og-description').content = TRIP.meta.subtitle + ' · ' + TRIP.days.length + ' jours';
    document.getElementById('meta-og-url').content         = location.href;
    document.getElementById('page-icon').href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>${emoji}</text></svg>`;

    renderProgramme();
    /* initAllMaps() doit être appelé APRÈS renderProgramme() car c'est
       renderDayPanel() (appelé par renderProgramme) qui injecte les divs
       Leaflet dans le DOM via renderMapBlock(). Leaflet a besoin que les
       divs existent avant d'appeler L.map() dessus.                    */
    requestAnimationFrame(initAllMaps);
    renderRestos();
    renderCartes();
    renderPratique();
    initNav();
    autoSelectDay();
  } catch (err) {
    console.error('[Voyage] Erreur au démarrage :', err);
    document.body.innerHTML = `<div style="font-family:sans-serif;padding:32px;text-align:center;color:#C2410C">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <strong>Impossible de charger le guide.</strong><br>
      <span style="font-size:13px;color:#888;margin-top:8px;display:block">
        Vérifiez la syntaxe du BLOC 1 (TRIP_DATA) — virgule ou accolade manquante ?
      </span>
    </div>`;
  }
}

/* Avec Leaflet en `defer`, on attend que le DOM ET les scripts defer
   soient prêts avant de lancer. DOMContentLoaded couvre les deux.    */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
